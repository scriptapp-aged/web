<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU KPS - ชุมนุมฟาร์มนิสิต</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ku-green: #006633;
            --ku-gold: #b29d6c;
            --ku-gold-light: #f9d976;
            --text-dark: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }

        body { background-color: #f8fafc; color: var(--text-dark); overflow-x: hidden; }

        /* --- Compact Header (เตี้ยลง แต่ยังอลังการ) --- */
        .header-section {
            background: linear-gradient(135deg, #004d26 0%, #006633 100%);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            border-bottom: 5px solid var(--ku-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Shine Animation บนตัวอักษรแบบกะทัดรัด */
        .animated-title {
            font-size: 3rem; /* ปรับขนาดเล็กลงจากเดิมที่ 5.5rem */
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(
                to right, 
                var(--ku-gold) 20%, 
                var(--ku-gold-light) 40%, 
                #fff 50%, 
                var(--ku-gold-light) 60%, 
                var(--ku-gold) 80%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
            margin-bottom: 5px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 200;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- Content Body --- */
        .content-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 50px 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .status-pill {
            display: flex; align-items: center; gap: 8px; 
            background: #fff; padding: 6px 15px; border-radius: 50px; 
            font-size: 0.8rem; border: 1px solid #eee;
        }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 5px #22c55e; }

        /* --- Service Grid (Die-cut) --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .card {
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }

        .img-wrap {
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .img-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: 0.4s;
        }

        .card:hover img {
            transform: translateY(-10px);
            filter: drop-shadow(0 20px 25px rgba(0, 102, 51, 0.2));
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 500;
            text-decoration: underline;
            margin-bottom: 10px;
        }

        /* --- Info Bar --- */
        .info-strip {
            background: #fff9db;
            color: #85701d;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .animated-title { font-size: 2.2rem; }
            .header-section { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <header class="header-section">
        <h1 class="animated-title">ชุมนุมฟาร์มนิสิต</h1>
        <p class="subtitle">Faculty of Education and Development Sciences</p>
    </header>

    <main class="content-body">
        <div class="section-header">
            <h2 style="font-size: 1.5rem; font-weight: 600;">บริการ | Service</h2>
            <div class="status-pill">
                <span class="dot"></span> ระบบพร้อมใช้งาน
            </div>
        </div>

        <div class="grid">
            <a href="#" class="card">
                <div class="img-wrap">
                    <img src="https://static.vecteezy.com/system/resources/previews/009/397/835/original/man-student-with-backpack-free-png.png" alt="">
                </div>
                <h3>จองห้องประชุม</h3>
                <p style="font-size: 0.8rem; color: #94a3b8;">เปิดระบบทดสอบ (Beta)</p>
            </a>

            <a href="#" class="card">
                <div class="img-wrap">
                    <img src="https://static.vecteezy.com/system/resources/previews/009/384/620/original/young-girl-student-holding-book-free-png.png" alt="">
                </div>
                <h3>ตารางการจองห้อง</h3>
            </a>

            <a href="#" class="card">
                <div class="img-wrap">
                    <img src="https://static.vecteezy.com/system/resources/previews/009/397/892/original/man-student-carrying-a-lot-of-books-free-png.png" alt="">
                </div>
                <h3>แจ้งปัญหาการใช้งาน</h3>
            </a>
        </div>

        <div class="info-strip">
            <i class="fas fa-info-circle"></i> เพื่อความสะดวก โปรดใช้งานผ่าน iPad หรือ คอมพิวเตอร์
        </div>
    </main>

</body>
</html>

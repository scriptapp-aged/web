<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU KPS - ชุมนุมฟาร์มนิสิต</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ku-green: #006633;
            --ku-gold: #b29d6c;
            --ku-gold-light: #f9d976;
            --text-dark: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }

        body { background-color: #fcfdfc; color: var(--text-dark); overflow-x: hidden; }

        /* --- Header ขนาดกลาง (กำลังดี ไม่เล็กไม่ใหญ่) --- */
        .header-section {
            background: linear-gradient(135deg, #004d26 0%, #006633 100%);
            padding: 70px 20px; /* เพิ่มพื้นที่หายใจให้ดูภูมิฐาน */
            text-align: center;
            position: relative;
            border-bottom: 6px solid var(--ku-gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        /* หัวข้อแอนิเมชันขนาดกลาง (3.8rem) */
        .animated-title {
            font-size: 3.8rem; 
            font-weight: 800;
            letter-spacing: -1px;
            /* Shimmer Effect แบบเข้มข้น */
            background: linear-gradient(
                to right, 
                var(--ku-gold) 10%, 
                var(--ku-gold-light) 30%, 
                #fff 50%, 
                var(--ku-gold-light) 70%, 
                var(--ku-gold) 90%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 3.5s linear infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); /* เพิ่มเงาให้ตัวหนังสือลอยออกมา */
            margin-bottom: 12px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* --- Content Body --- */
        .content-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 2px solid #edf2f7;
        }

        .status-pill {
            display: flex; align-items: center; gap: 10px; 
            background: #f0fdf4; color: #166534; padding: 10px 25px; 
            border-radius: 50px; font-size: 0.9rem; font-weight: 500;
        }
        .dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }

        /* --- Service Grid (Die-cut) --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
        }

        .card {
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .img-wrap {
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 25px;
        }

        .img-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.12));
            transition: 0.4s;
        }

        .card:hover img {
            transform: translateY(-15px) scale(1.05);
            filter: drop-shadow(0 25px 35px rgba(0, 102, 51, 0.25));
        }

        .card h3 {
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: underline;
            margin-bottom: 15px;
            color: #0f172a;
        }

        /* --- Info Bar --- */
        .info-strip {
            background: #fffbeb;
            color: #92400e;
            padding: 20px;
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
            margin-top: 60px;
            border: 1px solid #fef3c7;
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; gap: 80px; }
            .animated-title { font-size: 2.8rem; }
            .header-section { padding: 50px 20px; }
        }
    </style>
</head>
<body>

    <header class="header-section">
        <h1 class="animated-title">ชุมนุมฟาร์มนิสิต</h1>
        <p class="subtitle">Faculty of Education and Development Sciences</p>
    </header>

    <main class="content-body">
        <div class="section-header">
            <h2 style="font-size: 1.8rem; font-weight: 800;">บริการ | Service</h2>
            <div class="status-pill">
                <span class="dot"></span> ระบบพร้อมใช้งาน (Active)
            </div>
        </div>

        <div class="grid">
            <a href="#" class="card">
                <div class="img-wrap">
                    <img src="https://static.vecteezy.com/system/resources/previews/009/397/835/original/man-student-with-backpack-free-png.png" alt="">
                </div>
                <h3>จองห้องประชุม</h3>
                <p style="font-size: 0.85rem; color: #94a3b8;"><i class="fas fa-satellite-dish"></i> เปิดระบบทดสอบ</p>
            </a>

            <a href="#" class="card">
                <div class="img-wrap">
                    <img src="https://static.vecteezy.com/system/resources/previews/009/384/620/original/young-girl-student-holding-book-free-png.png" alt="">
                </div>
                <h3>ตารางการจองห้อง</h3>
            </a>

            <a href="#" class="card">
                <div class="img-wrap">
                    <img src="https://static.vecteezy.com/system/resources/previews/009/397/892/original/man-student-carrying-a-lot-of-books-free-png.png" alt="">
                </div>
                <h3>แจ้งปัญหาการใช้งาน</h3>
            </a>
        </div>

        <div class="info-strip">
            <i class="fas fa-info-circle"></i> เพื่อความสะดวก โปรดใช้งานผ่าน iPad หรือ คอมพิวเตอร์ส่วนบุคคล
        </div>
    </main>

</body>
</html>

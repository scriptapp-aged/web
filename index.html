<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU KPS | ชุมนุมฟาร์มนิสิต</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #006633;
            --gold: #b29d6c;
            --gold-light: #f9d976;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }

        body {
            background: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% -20%, #e8f5e9 0%, #f1f5f9 100%);
        }

        /* --- ✨ ส่วนหัวข้ออลังการ (The Mega Header) --- */
        .hero-section {
            padding: 100px 20px 60px;
            text-align: center;
            position: relative;
        }

        /* เอฟเฟกต์รัศมีเรืองแสงด้านหลังหัวข้อ */
        .header-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 150px;
            background: radial-gradient(circle, rgba(0, 102, 51, 0.15) 0%, transparent 70%);
            filter: blur(40px);
            animation: pulseGlow 4s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* แถบป้ายชื่อชุมนุม (The Emblem) */
        .emblem-container {
            display: inline-block;
            position: relative;
            z-index: 10;
            padding: 20px 80px;
            /* พื้นหลังไล่เฉดเขียวเข้มแบบพรีเมียม */
            background: linear-gradient(135deg, #004d26 0%, #006633 50%, #004d26 100%);
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.1);
            border: 2px solid var(--gold);
            transform: perspective(1000px) rotateX(5deg);
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: perspective(1000px) rotateX(5deg) translateY(0); }
            50% { transform: perspective(1000px) rotateX(5deg) translateY(-10px); }
        }

        /* ตัวอักษรสีทอง Shimmer */
        .animated-title {
            font-size: clamp(2rem, 5vw, 3.8rem);
            font-weight: 800;
            margin-bottom: 0;
            background: linear-gradient(to bottom, #f9d976 20%, #b29d6c 50%, #f9d976 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shineText 5s linear infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            letter-spacing: 2px;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .faculty-subtitle {
            color: var(--gold-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
            margin-top: 10px;
            opacity: 0.9;
        }

        /* --- ส่วนบริการ (Grid) --- */
        .main-portal {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 100px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .service-card {
            background: #ffffff;
            border-radius: 30px;
            padding: 40px 20px;
            text-decoration: none;
            color: #334155;
            text-align: center;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            border: 1px solid #edf2f7;
            position: relative;
        }

        .service-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0, 102, 51, 0.1);
            border-color: var(--primary);
        }

        .img-box {
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 25px;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1));
            transition: 0.5s;
        }

        .service-card:hover .img-box img {
            transform: scale(1.1);
            filter: drop-shadow(0 25px 40px rgba(0, 102, 51, 0.2));
        }

        .service-card h3 {
            font-size: 1.3rem;
            font-weight: 600;
            text-decoration: underline;
            color: var(--primary);
        }

        /* แถบแจ้งเตือนด้านล่าง */
        .info-bar {
            grid-column: span 3;
            background: #fff9db;
            color: #85701d;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 30px;
        }

        @media (max-width: 900px) {
            .main-portal { grid-template-columns: 1fr; }
            .info-bar { grid-column: span 1; }
            .emblem-container { padding: 15px 30px; }
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="header-glow"></div>
        
        <div class="emblem-container">
            <h1 class="animated-title">ชุมนุมฟาร์มนิสิต</h1>
            <div class="faculty-subtitle">FACULTY OF EDUCATION & DEV. SCIENCES</div>
        </div>
        
        <p style="margin-top: 30px; color: #64748b; font-size: 0.9rem; font-weight: 300;">
            KASETSART UNIVERSITY KAMPHAENG SAEN
        </p>
    </header>

    <div class="main-portal">
        <a href="#" class="service-card">
            <div class="img-box">
                <img src="https://static.vecteezy.com/system/resources/previews/009/397/835/original/man-student-with-backpack-free-png.png" alt="Student 1">
            </div>
            <h3>จองห้องประชุม</h3>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 5px;">ระบบเปิดให้ทดสอบเบต้า</p>
        </a>

        <a href="#" class="service-card">
            <div class="img-box">
                <img src="https://static.vecteezy.com/system/resources/previews/009/384/620/original/young-girl-student-holding-book-free-png.png" alt="Student 2">
            </div>
            <h3>ตารางการจองห้อง</h3>
        </a>

        <a href="#" class="service-card">
            <div class="img-box">
                <img src="https://static.vecteezy.com/system/resources/previews/009/397/892/original/man-student-carrying-a-lot-of-books-free-png.png" alt="Student 3">
            </div>
            <h3>แจ้งปัญหาการใช้งาน</h3>
        </a>

        <div class="info-bar">
            <i class="fas fa-info-circle"></i> โปรดใช้งานผ่าน iPad หรือ คอมพิวเตอร์เพื่อความสะดวกสูงสุด
        </div>
    </div>

</body>
</html>

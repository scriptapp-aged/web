<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU KPS | ชุมนุมฟาร์มนิสิต</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-neon: #00ff88;
            --ku-green: #006633;
            --text-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }

        body {
            background-color: #ffffff;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }

        /* --- ✨ แอนิเมชันพื้นหลังฟุ้งๆ --- */
        .bg-blob {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: moveBlob 20s infinite alternate;
        }

        @keyframes moveBlob {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(100%, 50%) scale(1.5); }
        }

        /* --- Header Section --- */
        .hero-header {
            padding: 140px 20px 80px;
            text-align: center;
            position: relative;
            animation: fadeInUp 1s cubic-bezier(0.2, 1, 0.2, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .header-glow {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.2) 0%, transparent 70%);
            filter: blur(100px);
            z-index: 0;
            animation: breathing 4s ease-in-out infinite;
        }

        @keyframes breathing {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .main-title {
            font-size: clamp(3.5rem, 10vw, 6.5rem);
            font-weight: 700;
            letter-spacing: -4px;
            line-height: 0.9;
            color: var(--text-dark);
            margin-bottom: 25px;
            background: linear-gradient(90deg, #0f172a, #006633, #0f172a);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textFlow 8s linear infinite;
        }

        @keyframes textFlow {
            to { background-position: 200% center; }
        }

        .subtitle-pill {
            display: inline-block;
            background: rgba(241, 245, 249, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 28px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ku-green);
            letter-spacing: 2px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            margin-bottom: 15px;
        }

        /* --- Service Portal Cards --- */
        .main-portal {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 150px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
        }

        .card {
            text-align: center;
            text-decoration: none;
            color: inherit;
            position: relative;
            /* แอนิเมชันตอนปรากฏ */
            opacity: 0;
            animation: cardReveal 0.8s cubic-bezier(0.2, 1, 0.2, 1) forwards;
        }

        /* หน่วงเวลาแต่ละการ์ด */
        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.4s; }
        .card:nth-child(3) { animation-delay: 0.6s; }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card:hover { transform: translateY(-25px); }

        .image-wrapper {
            width: 100%;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 30px;
            position: relative;
        }

        .image-wrapper::before {
            content: '';
            position: absolute;
            width: 250px; height: 100px;
            background: rgba(0, 255, 136, 0.15);
            filter: blur(60px);
            border-radius: 50%;
            bottom: 30px;
            z-index: -1;
            transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .card:hover .image-wrapper::before { 
            background: rgba(0, 255, 136, 0.4); 
            transform: scale(1.5);
            filter: blur(40px);
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: grayscale(100%) opacity(0.6) brightness(1.1);
            transition: 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .card:hover img {
            filter: grayscale(0%) opacity(1) drop-shadow(0 30px 60px rgba(0,0,0,0.12));
            transform: scale(1.08) translateY(-10px);
        }

        .card h3 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-dark);
            position: relative;
            display: inline-block;
            transition: 0.3s;
        }

        .card:hover h3 { color: var(--ku-green); letter-spacing: 1px; }

        .card h3::after {
            content: '';
            position: absolute;
            bottom: -8px; left: 0;
            width: 0; height: 3px;
            background: linear-gradient(90deg, var(--primary-neon), var(--ku-green));
            transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .card:hover h3::after { width: 100%; }

        /* --- Bottom Floating Nav --- */
        .bottom-nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 14px 35px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: slideUp 1s 1s cubic-bezier(0.2, 1, 0.2, 1) both;
        }

        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 40px; opacity: 1; }
        }

        .status-dot { width: 10px; height: 10px; background: var(--primary-neon); border-radius: 50%; position: relative; }
        .status-dot::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: var(--primary-neon);
            border-radius: 50%;
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        @media (max-width: 1024px) {
            .main-portal { grid-template-columns: 1fr; gap: 80px; }
            .main-title { font-size: 4rem; letter-spacing: -2px; }
            .image-wrapper { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="bg-blob"></div>
    <div class="header-glow"></div>

    <header class="hero-header">
        <div class="title-container">
            <div class="subtitle-pill">DIGITAL PORTAL 2.6</div>
            <h1 class="main-title">ชุมนุมฟาร์มนิสิต</h1>
            <p style="color: #64748b; font-weight: 300; letter-spacing: 3px; font-size: 1rem; opacity: 0.8;">
                FACULTY OF EDUCATION AND DEVELOPMENT SCIENCES
            </p>
        </div>
    </header>

    <div class="main-portal">
        <a href="#" class="card">
            <div class="image-wrapper">
                <img src="090.png" alt="Student 1">
            </div>
            <h3>คณะกรรมการฟาร์ม</h3>
            <p style="font-size: 0.85rem; color: #64748b; margin-top: 8px; font-weight: 300;">ปีการศึกษา 2569</p>
        </a>

        <a href="#" class="card">
            <div class="image-wrapper">
                <img src="https://static.vecteezy.com/system/resources/previews/009/384/620/original/young-girl-student-holding-book-free-png.png" alt="Student 2">
            </div>
            <h3>จองห้องประชุม</h3>
            <p style="font-size: 0.85rem; color: #64748b; margin-top: 8px; font-weight: 300;">Smart Room Reservation</p>
        </a>

        <a href="#" class="card">
            <div class="image-wrapper">
                <img src="https://static.vecteezy.com/system/resources/previews/009/397/892/original/man-student-carrying-a-lot-of-books-free-png.png" alt="Student 3">
            </div>
            <h3>โครงการชุมนุม</h3>
            <p style="font-size: 0.85rem; color: #64748b; margin-top: 8px; font-weight: 300;">ปีการศึกษา 2569</p>
        </a>
    </div>

    <div class="bottom-nav">
        <div class="status-dot"></div>
        <span style="font-weight: 500;">SYSTEM ONLINE</span>
        <div style="width: 1px; height: 18px; background: rgba(255,255,255,0.2);"></div>
        <span style="opacity: 0.7; font-weight: 300;">Kasetsart University</span>
    </div>

</body>
</html>

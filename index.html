<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU KPS | ชุมนุมฟาร์มนิสิต</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-neon: #00ff88; /* เขียวสว่างแบบนีออน ไม่แก่ */
            --ku-green: #006633;
            --text-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }

        body {
            background-color: #ffffff;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            /* พื้นหลังขาวสะอาด มีจุดตารางจางๆ แบบเว็บ Design */
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- ✨ Modern Header (ไม่แก่ ไม่ริบบิ้น) --- */
        .hero-header {
            padding: 120px 20px 80px;
            text-align: center;
            position: relative;
        }

        /* แสงฟุ้งด้านหลังตัวอักษร (Backlight) */
        .header-glow {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: moveGlow 10s infinite alternate;
        }

        @keyframes moveGlow {
            from { transform: translate(-60%, -40%) scale(1); }
            to { transform: translate(-40%, -60%) scale(1.2); }
        }

        .title-container { position: relative; z-index: 1; }

        .main-title {
            font-size: clamp(3.5rem, 10vw, 6.5rem);
            font-weight: 700;
            letter-spacing: -3px; /* ตัวอักษรชิดกันแบบเว็บนอก */
            line-height: 1;
            color: var(--text-dark);
            margin-bottom: 20px;
            /* แอนิเมชันสีเลื่อนผ่านตัวอักษรเบาๆ */
            background: linear-gradient(90deg, #0f172a, #006633, #0f172a);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textFlow 5s linear infinite;
        }

        @keyframes textFlow {
            to { background-position: 200% center; }
        }

        .subtitle-pill {
            display: inline-block;
            background: #f1f5f9;
            padding: 8px 24px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--ku-green);
            letter-spacing: 1px;
            border: 1px solid #e2e8f0;
        }

        /* --- Service Section (Grid แบบโปร่งแสง) --- */
        .main-portal {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 100px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .card {
            text-align: center;
            text-decoration: none;
            color: inherit;
            position: relative;
            transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .card:hover { transform: translateY(-20px); }

        .image-wrapper {
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 20px;
            position: relative;
        }

        /* แสงวงกลมหลังรูป */
        .image-wrapper::before {
            content: '';
            position: absolute;
            width: 200px; height: 200px;
            background: rgba(0, 255, 136, 0.1);
            filter: blur(50px);
            border-radius: 50%;
            bottom: 20px;
            z-index: -1;
            transition: 0.5s;
        }

        .card:hover .image-wrapper::before { background: rgba(0, 255, 136, 0.3); width: 250px; }

        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: grayscale(100%) opacity(0.8); /* ตอนปกติจะดู Art ขาวดำ */
            transition: 0.5s ease;
        }

        .card:hover img {
            filter: grayscale(0%) opacity(1) drop-shadow(0 20px 40px rgba(0,0,0,0.1));
            transform: scale(1.05);
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-dark);
            position: relative;
            display: inline-block;
        }

        /* เส้นใต้แบบ Minimal วิ่งจากกลาง */
        .card h3::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 50%;
            width: 0; height: 2px;
            background: var(--primary-neon);
            transition: 0.4s;
            transform: translateX(-50%);
        }

        .card:hover h3::after { width: 100%; }

        /* แถบแจ้งเตือนล่างสุด */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #fff;
            font-size: 0.85rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .status-dot { width: 8px; height: 8px; background: var(--primary-neon); border-radius: 50%; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2.5); } }

        @media (max-width: 900px) {
            .main-portal { grid-template-columns: 1fr; }
            .main-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="header-glow"></div>

    <header class="hero-header">
        <div class="title-container">
            <div class="subtitle-pill">PORTAL v.2026</div>
            <h1 class="main-title">ชุมนุมฟาร์มนิสิต</h1>
            <p style="color: #64748b; font-weight: 200; letter-spacing: 2px; font-size: 1.1rem;">
                FACULTY OF EDUCATION AND DEVELOPMENT SCIENCES
            </p>
        </div>
    </header>

    <div class="main-portal">
        <a href="#" class="card">
            <div class="image-wrapper">
                <img src="https://static.vecteezy.com/system/resources/previews/009/397/835/original/man-student-with-backpack-free-png.png" alt="Student 1">
            </div>
            <h3>จองห้องประชุม</h3>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 5px;">Room Reservation System</p>
        </a>

        <a href="#" class="card">
            <div class="image-wrapper">
                <img src="https://static.vecteezy.com/system/resources/previews/009/384/620/original/young-girl-student-holding-book-free-png.png" alt="Student 2">
            </div>
            <h3>ตารางการจองห้อง</h3>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 5px;">Live Status Schedule</p>
        </a>

        <a href="#" class="card">
            <div class="image-wrapper">
                <img src="https://static.vecteezy.com/system/resources/previews/009/397/892/original/man-student-carrying-a-lot-of-books-free-png.png" alt="Student 3">
            </div>
            <h3>แจ้งปัญหาการใช้งาน</h3>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 5px;">Service & Support</p>
        </a>
    </div>

    <div class="bottom-nav">
        <div class="status-dot"></div>
        <span>ระบบพร้อมใช้งาน (System Active)</span>
        <div style="width: 1px; height: 15px; background: #444;"></div>
        <span style="opacity: 0.6;">Kasetsart University</span>
    </div>

</body>
</html>

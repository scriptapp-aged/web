<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --sidebar-width: 280px;
            --ku-green: #006633;
            --ku-gold: #b29d6c;
            --glass-bg: rgba(45, 45, 45, 0.95);
            --nav-active: rgba(255, 255, 255, 0.1);
        }

        /* --- Sidebar ปรับปรุงใหม่ --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: blur(10px); /* เอฟเฟกต์กระจกฝ้า */
            color: #ffffff;
            padding: 0; /* เปลี่ยนเป็น 0 เพื่อจัด Layout ภายในใหม่ */
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
        }

        /* ส่วนหัวของ Sidebar */
        .sidebar-header {
            padding: 50px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: 1px;
            color: #fff;
            margin-bottom: 10px;
        }

        .brand-sub {
            font-size: 0.75rem;
            color: var(--ku-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ส่วนเมนู */
        .sidebar-nav {
            flex-grow: 1;
            padding: 20px 15px;
        }

        .nav-list { list-style: none; }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            gap: 15px;
        }

        /* ไอคอนในเมนู */
        .nav-link i {
            width: 20px;
            font-size: 1.1rem;
            text-align: center;
            transition: 0.3s;
        }

        /* สถานะ Active และ Hover */
        .nav-link:hover {
            color: #ffffff;
            background: var(--nav-active);
            transform: translateX(5px);
        }

        .nav-link.active {
            background: linear-gradient(90deg, var(--ku-green) 0%, rgba(0,102,51,0.5) 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 102, 51, 0.3);
        }

        .nav-link.active i { color: var(--ku-gold); }

        /* เมนูย่อย (Submenu) */
        .has-submenu {
            cursor: pointer;
        }
        
        .submenu-indicator {
            margin-left: auto;
            font-size: 0.7rem !important;
            opacity: 0.5;
        }

        /* ส่วนท้าย Sidebar (User Profile หรือ Logout) */
        .sidebar-footer {
            padding: 30px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--ku-gold);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: #333;
        }

        .user-name { font-size: 0.9rem; font-weight: 400; color: #fff; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand-logo">AG-ED<br>KU.KPS.</div>
            <div class="brand-sub">Smart Farming Portal</div>
        </div>

        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li>
                    <a href="#" class="nav-link active">
                        <i class="fas fa-th-large"></i>
                        <span>หน้าหลัก</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link has-submenu">
                        <i class="fas fa-door-closed"></i>
                        <span>จองห้องประชุม</span>
                        <i class="fas fa-chevron-down submenu-indicator"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <i class="fas fa-calendar-alt"></i>
                        <span>ตารางกิจกรรม</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <i class="fas fa-bullhorn"></i>
                        <span>ข่าวประชาสัมพันธ์</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <i class="fas fa-cog"></i>
                        <span>ตั้งค่าระบบ</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">M</div>
                <div>
                    <div class="user-name">Methee Jai.</div>
                    <div style="font-size: 0.7rem; color: #888;">Administrator</div>
                </div>
            </div>
        </div>
    </aside>

</body>
</html>

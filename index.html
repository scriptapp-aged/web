<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU KPS - ชุมนุมฟาร์มนิสิต (Cinematic)</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ku-green: #006633;
            --ku-gold: #b29d6c;
            --ku-gold-light: #f9d976;
            --text-main: #1e293b;
            --glass-white: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }

        body { background-color: #f8fafc; color: var(--text-main); overflow-x: hidden; }

        /* --- Cinematic Hero Section with Soft Glow --- */
        .hero-section {
            height: 60vh;
            background: linear-gradient(135deg, #004d26 0%, #006633 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            color: #fff;
            overflow: hidden;
            border-bottom-left-radius: 100px; /* เพิ่มความโค้งมนให้ดูแพง */
            box-shadow: 0 20px 40px rgba(0, 102, 51, 0.1);
        }

        /* 3. แสงรังสีทองจางๆ หายใจเบาๆ ด้านหลังหัวข้อ */
        .hero-section::before {
            content: ''; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(178, 157, 108, 0.15) 0%, transparent 70%);
            top: -200px; right: -100px;
            animation: breathingGlow 6s ease-in-out infinite;
        }

        @keyframes breathingGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* ส่วนหัวข้อ: ใช้ Text Gradient & Shimmer Effect */
        .club-title {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            /* Shimmer Effect: แสงเงาวิ่งผ่านตัวอักษรสีทอง */
            background: linear-gradient(
                to right, 
                var(--ku-gold) 20%, 
                var(--ku-gold-light) 40%, 
                #fff 50%, 
                var(--ku-gold-light) 60%, 
                var(--ku-gold) 80%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 5s linear infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .faculty-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Service Body --- */
        .content-body { max-width: 1200px; margin: -80px auto 0; padding: 0 40px 80px; position: relative; z-index: 10; }

        .service-container {
            background: #fff;
            border-radius: 40px;
            padding: 70px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        .status-pill {
            display: flex; align-items: center; gap: 8px; background: #f0fdf4;
            color: #166534; padding: 10px 25px; border-radius: 50px; font-size: 0.85rem; font-weight: 500;
        }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        /* --- Die-cut Grid with Parallax Hover --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 50px; }
        .card { text-align: center; text-decoration: none; color: inherit; transition: 0.4s ease; perspective: 1000px; }
        
        .card:hover { transform: translateY(-15px); }

        .img-wrap { height: 350px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 30px; position: relative; overflow: hidden;}
        .img-wrap img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        /* Hover Effect: รูปพุ่งออกมาและเงาเข้มขึ้น */
        .card:hover img {
            transform: scale(1.1) translateY(-10px) rotate(1deg); 
            filter: drop-shadow(0 30px 50px rgba(0, 102, 51, 0.25));
        }

        .card h3 { font-size: 1.4rem; font-weight: 600; color: #0f172a; margin-bottom: 12px; }

        /* เส้นใต้แบบ Minimal วิ่งจากกลาง */
        .card h3::after {
            content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px;
            background: var(--ku-green);
            transition: 0.4s;
            transform: translateX(-50%);
        }
        .card:hover h3::after { width: 60%; }

        /* --- Info Bar --- */
        .info-strip {
            background: #fffbeb;
            color: #92400e;
            padding: 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            margin-top: 60px;
            border: 1px solid #fef3c7;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; gap: 80px; }
            .club-title { font-size: 3.5rem; }
            .hero-section { height: 50vh; border-bottom-left-radius: 50px; }
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="faculty-tag">Faculty of Education and Development Sciences</div>
        
        <h1 class="club-title">ชุมนุมฟาร์มนิสิต</h1>
        
        <p style="opacity: 0.6; font-weight: 200; letter-spacing: 2px; margin-top: 15px; animation: fadeIn 2s;">
            KASETSART UNIVERSITY KAMPHAENG SAEN
        </p>
    </header>

    <main class="content-body">
        <section class="service-container">
            <div class="section-header">
                <h2 style="font-size: 2rem; font-weight: 600;">บริการ | Service</h2>
                <div class="status-pill">
                    <span class="dot"></span> ระบบออนไลน์ (V.2026)
                </div>
            </div>

            <div class="grid">
                <a href="#" class="card">
                    <div class="img-wrap">
                        <img src="https://static.vecteezy.com/system/resources/previews/009/397/835/original/man-student-with-backpack-free-png.png" alt="Student 1">
                    </div>
                    <h3>จองห้องประชุม</h3>
                    <div style="margin-top:10px; font-size: 0.8rem; color: #94a3b8;"><i class="fas fa-flask"></i> Beta Version</div>
                </a>

                <a href="#" class="card">
                    <div class="img-wrap">
                        <img src="https://static.vecteezy.com/system/resources/previews/009/384/620/original/young-girl-student-holding-book-free-png.png" alt="Student 2">
                    </div>
                    <h3>ตารางการจองห้อง</h3>
                </a>

                <a href="#" class="card">
                    <div class="img-wrap">
                        <img src="https://static.vecteezy.com/system/resources/previews/009/397/892/original/man-student-carrying-a-lot-of-books-free-png.png" alt="Student 3">
                    </div>
                    <h3>แจ้งปัญหาการใช้งาน</h3>
                </a>
            </div>

            <div class="info-strip">
                <i class="fas fa-magic"></i> เพื่อผลลัพธ์ที่ดีที่สุด แนะนำให้เปิดใช้งานผ่านอุปกรณ์หน้าจอใหญ่ (PC/iPad)
            </div>
        </section>
    </main>

</body>
</html>

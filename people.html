<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel | Agriculture & Environmental Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Root & Reset --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #ffffff;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            border-radius: 0 !important; /* บังคับขอบเหลี่ยมทุกจุด */
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* โทนเข้มสะอาดตา */
            min-height: 100vh;
            color: var(--text-color);
            padding: 50px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* --- Header --- */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .line {
            width: 60px;
            height: 4px;
            background: var(--accent-color);
            margin: 0 auto;
        }

        /* --- Tabs Navigation --- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 2px; /* ช่องว่างเล็กน้อยแบบเหลี่ยม */
            margin-bottom: 40px;
        }

        .tab-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 15px 40px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 400;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: #0f2027;
            font-weight: 700;
        }

        /* --- Personnel Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* --- Glass Card --- */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 5px;
            background: var(--accent-color);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            filter: grayscale(20%);
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .card p {
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* --- Animation --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>PERSONNEL</h1>
            <div class="line"></div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" onclick="updateView('teachers')">อาจารย์</button>
            <button class="tab-btn" onclick="updateView('committee')">คณะกรรมการฟาร์ม</button>
        </nav>

        <div id="personnel-grid" class="grid">
            </div>
    </div>

    <script>
        // ข้อมูลตัวอย่าง (คุณสามารถนำไปเชื่อมกับ Google Sheets API ได้ในอนาคต)
        const data = {
            teachers: [
                { name: "รศ.ดร. สมชาย รักเกษตร", pos: "อาจารย์ประจำหลักสูตร", img: "https://via.placeholder.com/200" },
                { name: "ผศ.ดร. นภา สดใส", pos: "อาจารย์ประจำหลักสูตร", img: "https://via.placeholder.com/200" },
                { name: "ดร. วิชาญ ใจดี", pos: "อาจารย์พิเศษ", img: "https://via.placeholder.com/200" }
            ],
            committee: [
                { name: "เมธี ใจสุขดี", pos: "ประธานกรรมการฟาร์มนิสิต", img: "https://via.placeholder.com/200" },
                { name: "สมโภชน์ ปลูกผัก", pos: "รองประธานฝ่ายปฏิบัติการ", img: "https://via.placeholder.com/200" },
                { name: "ใจดี รักดิน", pos: "เหรัญญิก", img: "https://via.placeholder.com/200" }
            ]
        };

        function updateView(category) {
            const grid = document.getElementById('personnel-grid');
            const btns = document.querySelectorAll('.tab-btn');

            // เปลี่ยนสถานะปุ่ม
            btns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(category === 'teachers' ? 'อาจารย์' : 'คณะกรรมการ')) {
                    btn.classList.add('active');
                }
            });

            // ล้างข้อมูลเดิมและใส่ข้อมูลใหม่
            grid.innerHTML = '';
            data[category].forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${item.img}" alt="${item.name}">
                        <h3>${item.name}</h3>
                        <p>${item.pos}</p>
                    </div>
                `;
            });
        }

        // เริ่มต้นหน้าเว็บด้วยเมนูอาจารย์
        window.onload = () => updateView('teachers');
    </script>
</body>
</html>

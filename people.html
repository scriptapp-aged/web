<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คณะกรรมการฟาร์ม 2569 | KU KPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ku-green: #006633; /* สีเขียวเกษตร */
            --ku-gold: #b29d6c; /* สีทอง */
            --soft-white: #ffffff; /* สีขาวหลัก */
            --bg-light: #f9fafb; /* สีพื้นหลัง */
            --border-light: #e5e7eb; /* สีเส้นขอบอ่อน */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            background-color: var(--bg-light);
            /* ลายจุด Dot Pattern แบบภาพต้นฉบับ */
            background-image: radial-gradient(#e5e7eb 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            padding: 80px 20px;
            text-align: center;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Header Section */
        .title-section { margin-bottom: 80px; }
        .title-section p { font-size: 1.1rem; color: #6b7280; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        .title-section h1 { font-size: 3rem; font-weight: 800; color: var(--ku-green); line-height: 1.2; margin-top: 10px; }

        /* การจัดเรียงการ์ด */
        .committee-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
            flex-wrap: wrap; /* ปล่อยให้พันแถวได้ถ้าจอแคบเกินไป */
        }

        /* --- ✨ ดีไซน์กรอบรูปใหม่ (Neumorphic Glow) --- */
        .member-card {
            background: var(--soft-white);
            width: 280px;
            border-radius: 40px; /* ขอบโค้งมนดูนุ่มนวล */
            /* Neumorphic Shadow: เงาหลายเลเยอร์ให้ดูมีความลึก */
            box-shadow: 
                10px 10px 20px rgba(0, 0, 0, 0.03), 
                inset 1px 1px 0px var(--soft-white), 
                inset -1px -1px 0px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-light);
            transition: all 0.4s ease;
            padding-bottom: 25px;
        }

        /* ตกแต่งเส้นสีเขียวที่มุมบน */
        .member-card::after {
            content: ''; position: absolute; top: -1px; left: -1px; width: 40px; height: 40px;
            border-radius: 40px 0 0 0;
            border-top: 6px solid var(--ku-green);
            border-left: 6px solid var(--ku-green);
        }

        /* เอฟเฟกต์เมื่อ Hover */
        .member-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 102, 51, 0.1); /* เงาสีเขียวจางๆ */
            border-color: var(--ku-green);
        }

        /* --- ส่วนรูปภาพ --- */
        .image-box {
            width: 100%;
            height: 320px; /* กำหนดความสูงตายตัว */
            background: #fdfdfd;
            border-radius: 40px 40px 0 0;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* ให้รูปคนชิดล่าง */
            overflow: hidden;
            border-bottom: 1px solid var(--border-light);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* บังคับให้รูปเต็มกรอบ */
            transition: 0.5s ease;
        }

        .member-card:hover .image-box img {
            transform: scale(1.05);
        }

        /* --- ส่วนข้อมูล --- */
        .card-content { padding: 25px 20px; text-align: left; }
        .member-card h3 { font-size: 1.3rem; font-weight: 600; color: var(--text-dark); margin-bottom: 5px; }
        .member-card p { font-size: 0.9rem; color: var(--ku-gold); font-weight: 400; }

        /* ปรับปรุงแอนิเมชันตอนโหลดหน้า */
        .member-card {
            opacity: 0;
            animation: fadeInReveal 1s ease-out forwards;
        }
        .member-card:nth-child(2) { animation-delay: 0.3s; }
        .member-card:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeInReveal {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .title-section h1 { font-size: 2.2rem; }
            .committee-row { gap: 20px; }
            .member-card { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-section">
        <p>FACULTY OF EDUCATION AND DEVELOPMENT SCIENCES</p>
        <h1>คณะกรรมการฟาร์ม 2569</h1>
    </div>

    <div class="committee-row">
        <div class="member-card">
            <div class="image-box">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/009/397/835/original/man-student-with-backpack-free-png.png" alt="ผศ.ดร.นิรันดร์">
            </div>
            <div class="card-content">
                <h3>ผศ.ดร.นิรันดร์ ยิ่งยวด</h3>
                <p>อาจารย์ที่ปรึกษาชุมนุม</p>
            </div>
        </div>

        <div class="member-card">
            <div class="image-box">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/009/384/620/original/young-girl-student-holding-book-free-png.png" alt="อ.ดร.อรวรรณ">
            </div>
            <div class="card-content">
                <h3>อ.ดร.อรวรรณ บุญทัน</h3>
                <span class="position">อาจารย์ที่ปรึกษาชุมนุม</span>
            </div>
        </div>

        <div class="member-card" style="border-top: 6px solid var(--ku-gold); box-shadow: 0 10px 30px rgba(178, 157, 108, 0.2);">
            <div class="image-box" style="height: 280px; background: #fafafa;">
                </div>
            <div class="card-content">
                <h3 style="color: #bbb; font-weight: 300;">(ว่าง)</h3>
                <p style="color: var(--ku-gold);">ประธาน</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>

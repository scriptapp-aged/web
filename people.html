<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRCD Personnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Root & Basic Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            border-radius: 0 !important; /* ย้ำความเหลี่ยมตามสไตล์ที่ชอบ */
        }

        body {
            background-color: #ffffff; /* พื้นหลังสีขาวบริสุทธิ์ */
            background-image: 
                radial-gradient(at 0% 0%, rgba(240, 240, 240, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(230, 235, 245, 0.5) 0px, transparent 50%);
            min-height: 100vh;
            color: #333;
            padding: 60px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- Header Section --- */
        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 1px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .accent-line {
            width: 80px;
            height: 5px;
            background: #2d3436; /* สีเทาเข้มเกือบดำ */
            margin: 0 auto;
        }

        /* --- Navigation Tabs --- */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 15px 40px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 400;
            color: #888;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn:hover {
            color: #000;
        }

        .tab-btn.active {
            color: #000;
            font-weight: 700;
        }

        .tab-btn.active::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #000;
        }

        /* --- Personnel Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        /* --- White Glass Card --- */
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #eeeeee;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            border-color: #ddd;
        }

        .card img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            margin-bottom: 25px;
            border: 1px solid #f0f0f0;
            padding: 5px;
            background: #fff;
        }

        .card h3 {
            font-size: 1.2rem;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 0.9rem;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- Animation --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; text-align: center; border-bottom: 1px solid #eee; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ภาควิชาการพัฒนาทรัพยากรมนุษย์และชุมชน</h1>
            <div class="accent-line"></div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('teachers')">คณาจารย์ประจำภาควิชา</button>
            <button class="tab-btn" onclick="switchTab('committee')">คณะกรรมการฟาร์ม</button>
        </nav>

        <div id="display-grid" class="grid">
            </div>
    </div>

    <script>
        // ข้อมูลตัวอย่าง
        const personnel = {
            teachers: [
                { name: "รศ.ดร. ชื่อจริง นามสกุล", pos: "อาจารย์ประจำภาควิชา", img: "https://via.placeholder.com/200/f8f9fa/333?text=Photo" },
                { name: "ผศ.ดร. ชื่อจริง นามสกุล", pos: "อาจารย์ประจำภาควิชา", img: "https://via.placeholder.com/200/f8f9fa/333?text=Photo" },
                { name: "ดร. ชื่อจริง นามสกุล", pos: "อาจารย์ประจำภาควิชา", img: "https://via.placeholder.com/200/f8f9fa/333?text=Photo" }
            ],
            committee: [
                { name: "เมธี ใจสุขดี", pos: "ประธานกรรมการฟาร์มนิสิต", img: "https://via.placeholder.com/200/f8f9fa/333?text=MEETHEE" },
                { name: "คณะกรรมการ ท่านที่ 2", pos: "ฝ่ายประสานงาน", img: "https://via.placeholder.com/200/f8f9fa/333?text=Photo" },
                { name: "คณะกรรมการ ท่านที่ 3", pos: "ฝ่ายสวัสดิการ", img: "https://via.placeholder.com/200/f8f9fa/333?text=Photo" }
            ]
        };

        function switchTab(type) {
            const grid = document.getElementById('display-grid');
            const btns = document.querySelectorAll('.tab-btn');

            // อัปเดตปุ่มที่เลือก
            btns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(type)) btn.classList.add('active');
            });

            // ล้างหน้าจอและสร้างการ์ดใหม่
            grid.innerHTML = '';
            personnel[type].forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${item.img}" alt="${item.name}">
                        <h3>${item.name}</h3>
                        <p>${item.pos}</p>
                    </div>
                `;
            });
        }

        // โหลดข้อมูลชุดแรก (อาจารย์) ทันทีที่เปิดหน้าเว็บ
        window.onload = () => switchTab('teachers');
    </script>
</body>
</html>

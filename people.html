<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRCD Personnel - KPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Base Style (Sharp Edges & White Theme) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            border-radius: 0 !important;
        }

        body {
            background-color: #ffffff;
            color: #333;
            padding: 60px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .accent-line {
            width: 60px;
            height: 4px;
            background: #000;
            margin: 0 auto;
        }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 15px 30px;
            cursor: pointer;
            font-size: 1rem;
            color: #999;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: #000;
            font-weight: 700;
            border-bottom: 3px solid #000;
        }

        /* --- Layout Control --- */
        .section-title {
            width: 100%;
            text-align: center;
            font-weight: 700;
            margin: 40px 0 20px;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: #555;
            display: none; /* ซ่อนหัวข้อกลุ่มย่อยถ้าต้องการความคลีน */
        }

        .grid {
            display: grid;
            gap: 25px;
            margin-bottom: 50px;
        }

        /* แถวเดี่ยว (หัวหน้า / รองหัวหน้า) */
        .grid-single {
            grid-template-columns: minmax(280px, 400px);
            justify-content: center;
        }

        /* แถวละ 3 คน (อาจารย์) */
        .grid-triple {
            grid-template-columns: repeat(3, 1fr);
        }

        @media (max-width: 900px) {
            .grid-triple { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .grid-triple { grid-template-columns: 1fr; }
        }

        /* --- Personnel Card --- */
        .card {
            background: #fff;
            border: 1px solid #eee;
            padding: 30px 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .card img {
            width: 140px;
            height: 180px;
            object-fit: cover;
            background: #f9f9f9;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }

        .card h3 {
            font-size: 1rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .card p {
            font-size: 0.85rem;
            color: #777;
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ภาควิชาการพัฒนาทรัพยากรมนุษย์และชุมชน</h1>
            <div class="accent-line"></div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" onclick="showTab('teachers')">คณาจารย์ประจำภาควิชา</button>
            <button class="tab-btn" onclick="showTab('committee')">คณะกรรมการฟาร์ม</button>
        </nav>

        <div id="content-area" class="fade-in">
            </div>
    </div>

    <script>
        const personnelData = {
            teachers: {
                head: [{ name: "หัวหน้าภาควิชา", pos: "หัวหน้าภาควิชาการพัฒนาทรัพยากรมนุษย์และชุมชน", img: "12.jpg" }],
                deputy: [{ name: "รองหัวหน้าภาควิชา", pos: "รองหัวหน้าภาควิชาการพัฒนาทรัพยากรมนุษย์และชุมชน", img: "11.jpg" }],
                staff: Array(11).fill({ name: "ชื่ออาจารย์", pos: "อาจารย์ประจำภาควิชา", img: "" })
            },
            committee: {
                staff: [
                    { name: "เมธี ใจสุขดี", pos: "ประธานกรรมการฟาร์มนิสิต", img: "" },
                    { name: "กรรมการท่านที่ 2", pos: "กรรมการ", img: "" },
                    { name: "กรรมการท่านที่ 3", pos: "กรรมการ", img: "" }
                ]
            }
        };

        function createCard(person) {
            const imgSrc = person.img || "https://via.placeholder.com/140x180/f0f0f0/999?text=PHOTO";
            return `
                <div class="card">
                    <img src="${imgSrc}" alt="${person.name}">
                    <h3>${person.name}</h3>
                    <p>${person.pos}</p>
                </div>
            `;
        }

        function showTab(type) {
            const content = document.getElementById('content-area');
            const btns = document.querySelectorAll('.tab-btn');
            
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            content.innerHTML = '';

            if (type === 'teachers') {
                const d = personnelData.teachers;
                
                // 1. หัวหน้าภาค (1 แถว)
                let html = `<div class="grid grid-single">${d.head.map(createCard).join('')}</div>`;
                
                // 2. รองหัวหน้าภาค (1 แถว)
                html += `<div class="grid grid-single">${d.deputy.map(createCard).join('')}</div>`;
                
                // 3. อาจารย์ 11 คน (แถวละ 3)
                html += `<div class="grid grid-triple">${d.staff.map(createCard).join('')}</div>`;
                
                content.innerHTML = html;
            } else {
                // คณะกรรมการฟาร์ม (Grid ปกติ)
                content.innerHTML = `<div class="grid grid-triple">${personnelData.committee.staff.map(createCard).join('')}</div>`;
            }
        }

        // Initial Load
        window.onload = () => {
            // จำลองการโหลดหน้าแรกโดยส่ง event หลอกๆ
            showTab('teachers');
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปฏิทินการศึกษา 2567-2569</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e11d48;
            --navy-blue: #0000aa;
            --bg-light-cyan: #f0ffff;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .calendar-container {
            width: 100%;
            max-width: 900px;
        }

        /* ส่วนหัวและปุ่มสลับปี */
        .header-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .fire-icon { color: var(--primary-red); font-size: 32px; }

        .year-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--primary-red);
            margin: 0;
        }

        .year-selector {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .year-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
            transition: 0.2s;
        }

        .year-btn.active {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        /* โครงสร้างตารางตามภาพ */
        .main-card {
            border-radius: 4px;
            overflow: hidden;
        }

        .term-header {
            background-color: var(--navy-blue);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 24px;
            font-weight: 500;
        }

        .term-body {
            background-color: var(--bg-light-cyan);
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        /* การ์ดภาคเรียน */
        .semester-card {
            background: white;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            text-decoration: none;
            color: black;
            transition: transform 0.2s;
        }

        .semester-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .book-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
        }

        .semester-name {
            font-size: 22px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* สีไอคอนแยกตามเทอม */
        .icon-t1 { fill: #8b3a3a; } /* แดงเข้ม */
        .icon-t2 { fill: #4a773c; } /* เขียว */
        .icon-summer { fill: #8b5a8b; } /* ม่วง */

        @media (max-width: 600px) {
            .term-body { grid-template-columns: 1fr; }
            .header-section { flex-direction: column; align-items: flex-start; }
            .year-selector { margin-left: 0; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="header-section">
        <span class="fire-icon">🔥</span>
        <h1 class="year-title" id="displayYear">ปีการศึกษา 2567</h1>
        
        <div class="year-selector">
            <button class="year-btn active" onclick="changeYear('2567', this)">2567</button>
            <button class="year-btn" onclick="changeYear('2568', this)">2568</button>
            <button class="year-btn" onclick="changeYear('2569', this)">2569</button>
        </div>
    </div>

    <div class="main-card">
        <div class="term-header">ภาคปกติ</div>
        <div class="term-body">
            
            <a href="#" class="semester-card">
                <svg class="book-icon icon-t1" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
                <div class="semester-name">ภาคเรียนที่ 1</div>
            </a>

            <a href="#" class="semester-card">
                <svg class="book-icon icon-t2" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
                <div class="semester-name">ภาคเรียนที่ 2</div>
            </a>

            <a href="#" class="semester-card">
                <svg class="book-icon icon-summer" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
                <div class="semester-name">ภาคฤดูร้อน</div>
            </a>

        </div>
    </div>
</div>

<script>
    function changeYear(year, btn) {
        // เปลี่ยนข้อความหัวข้อ
        document.getElementById('displayYear').innerText = 'ปีการศึกษา ' + year;
        
        // สลับ Class Active ของปุ่ม
        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // คุณสามารถเพิ่ม Logic การเปลี่ยน Link หรือข้อมูลตรงนี้ได้
        console.log("เปลี่ยนข้อมูลเป็นปี: " + year);
    }
</script>

</body>
</html>

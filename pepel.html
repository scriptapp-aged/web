<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คณะกรรมการฟาร์ม 2569 | KU KPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ku-green: #006633;
            --ku-gold: #b29d6c;
            --bg-gray: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            background-color: var(--bg-gray);
            padding: 60px 20px;
            color: #1e293b;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; text-align: center; }

        /* Header */
        .title-section { margin-bottom: 60px; }
        .title-section h1 { color: var(--ku-green); font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .title-section p { color: #64748b; font-size: 1.1rem; }
        .hr-line { width: 100px; height: 5px; background: var(--ku-green); margin: 20px auto; border-radius: 2px; }

        /* การจัดวาง Grid ระบบลำดับชั้น */
        .row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Card ดีไซน์ - เน้นความเรียบหรู ขอบเหลี่ยมตามสไตล์ที่ชอบ */
        .member-card {
            background: #fff;
            width: 280px;
            padding: 35px 25px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--ku-green);
            transition: all 0.3s ease;
        }

        .member-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 102, 51, 0.12);
        }

        .image-box {
            width: 140px;
            height: 140px;
            background: #f8fafc;
            margin: 0 auto 25px;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #cbd5e1;
            font-size: 3.5rem;
            border-radius: 4px; /* ปรับเป็นสี่เหลี่ยมตามตราสัญลักษณ์ */
        }

        .member-card h3 { 
            font-size: 1.2rem; 
            color: var(--ku-green); 
            margin-bottom: 8px;
            font-weight: 600;
        }

        .member-card .position {
            font-size: 0.95rem;
            color: var(--ku-gold);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* ตกแต่งแถวที่ 2 (คนเดียว) ให้ดูเด่นขึ้นเล็กน้อย */
        .row-single .member-card {
            border-top-color: var(--ku-gold);
            width: 320px;
        }

        /* ปุ่มย้อนกลับ */
        .btn-back {
            display: inline-flex;
            align-items: center;
            margin-top: 40px;
            padding: 12px 30px;
            background: var(--ku-green);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-back i { margin-right: 10px; }
        .btn-back:hover { background: #004d26; box-shadow: 0 5px 15px rgba(0, 102, 51, 0.3); }

        @media (max-width: 768px) {
            .member-card { width: 100%; max-width: 300px; }
            .row-single .member-card { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-section">
        <p>คณะศึกษาศาสตร์และพัฒนศาสตร์</p>
        <h1>คณะกรรมการฟาร์ม</h1>
        <div class="hr-line"></div>
        <p>ปีการศึกษา 2569</p>
    </div>

    <div class="row">
        <div class="member-card">
            <div class="image-box"><i class="fas fa-user"></i></div>
            <h3>ชื่อ-นามสกุล</h3>
            <div class="position">ที่ปรึกษาชุมนุม</div>
        </div>
        <div class="member-card">
            <div class="image-box"><i class="fas fa-user"></i></div>
            <h3>ชื่อ-นามสกุล</h3>
            <div class="position">ที่ปรึกษาชุมนุม</div>
        </div>
    </div>

    <div class="row row-single">
        <div class="member-card">
            <div class="image-box"><i class="fas fa-user"></i></div>
            <h3>นายเมธี ใจสุขดี</h3>
            <div class="position">ประธานชุมนุม</div>
        </div>
    </div>

    <div class="row">
        <div class="member-card">
            <div class="image-box"><i class="fas fa-user"></i></div>
            <h3>ชื่อ-นามสกุล</h3>
            <div class="position">รองประธานชุมนุม</div>
        </div>
        <div class="member-card">
            <div class="image-box"><i class="fas fa-user"></i></div>
            <h3>ชื่อ-นามสกุล</h3>
            <div class="position">เลขานุการ</div>
        </div>
        <div class="member-card">
            <div class="image-box"><i class="fas fa-user"></i></div>
            <h3>ชื่อ-นามสกุล</h3>
            <div class="position">เหรัญญิก</div>
        </div>
        <div class="member-card">
            <div class="image-box"><i class="fas fa-user"></i></div>
            <h3>ชื่อ-นามสกุล</h3>
            <div class="position">ฝ่ายกิจกรรม</div>
        </div>
    </div>

    <a href="#" class="btn-back"><i class="fas fa-arrow-left"></i> ย้อนกลับหน้าหลัก</a>
</div>

</body>
</html>

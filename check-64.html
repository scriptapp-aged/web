<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบตรวจสอบการเรียนตามหลักสูตร - เกษตรและสิ่งแวดล้อมศึกษา</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1b6b35;--green-light:#2d9b50;--green-pale:#e8f5ec;--green-mid:#c2e8cc;
  --gold:#e8a020;--gold-light:#fdecc8;
  --sky:#1976d2;--sky-light:#e3f0fd;
  --coral:#e05c3a;--coral-light:#fdeae4;
  --bg:#f4f9f6;--white:#fff;--text:#1a2e1e;--muted:#5a7a62;--border:#c8e0cf;
  --radius:14px;--radius-sm:8px;
  --font:'Prompt', sans-serif;
  --font-title:'Mitr', sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

/* ===== AUTH (คงเดิม) ===== */
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
  background:linear-gradient(135deg,#e8f5ec 0%,#c2e8cc 40%,#fdecc8 100%);}
.auth-card{background:var(--white);border-radius:24px;padding:2.5rem;width:100%;max-width:420px;
  box-shadow:0 8px 40px rgba(27,107,53,0.13);border:2px solid var(--green-mid);}
.auth-logo{text-align:center;margin-bottom:1.75rem;}
.auth-title{font-family:var(--font-title);font-size:20px;font-weight:500;color:var(--green);}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--green);margin-bottom:6px;}
.field input,.field select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);
  font-family:var(--font);font-size:14px;outline:none;}
.btn-primary{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);
  font-family:var(--font-title);font-size:15px;cursor:pointer;transition:.2s;}

/* ===== MAIN LAYOUT (ขยายขนาด) ===== */
.main-wrap{min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--green);padding:1rem 5%;display:flex;align-items:center;gap:14px;color:#fff;position:sticky;top:0;z-index:100;}
.container-full{max-width:1300px;margin:0 auto;width:100%;}

/* ===== SUMMARY CARDS ===== */
.summary-section{padding:1.25rem 5%;display:grid;grid-template-columns:repeat(4,1fr);gap:15px;}
.sum-card{background:var(--white);border-radius:var(--radius);padding:1.2rem;border:2px solid var(--border);text-align:center;}
.sum-card .val{font-size:28px;font-weight:700;color:var(--green);}

/* ===== GROUP CARDS (ปรับให้แสดงผลเลย ไม่ต้องซ่อน) ===== */
.group-wrap{margin-bottom:1.5rem;}
.group-card{background:var(--white);border-radius:var(--radius);border:2px solid var(--border);overflow:hidden;}
.group-header{padding:1.2rem 1.5rem;background:var(--green-pale);border-bottom:2px solid var(--green-mid);display:flex;justify-content:space-between;align-items:center;}
.group-title{font-family:var(--font-title);font-size:17px;font-weight:500;color:var(--green);}
.group-body{display:block; padding-bottom: 10px;} /* สั่งให้แสดงตลอด */

/* ===== TABLE STRUCTURE (เพิ่มหัวตาราง) ===== */
.table-header{display:grid;grid-template-columns:40px 110px 1fr 80px 110px 120px;padding:10px 1.5rem;background:#f8faf9;font-weight:bold;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);}
.course-row{display:grid;grid-template-columns:40px 110px 1fr 80px 110px 120px;gap:10px;padding:12px 1.5rem;border-bottom:1px solid var(--border);align-items:center;}
.course-row:hover{background:#fafffe;}

/* Checkbox & Inputs */
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.check-box.done{background:var(--green);border-color:var(--green);}
.term-input{width:90px;padding:6px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:12px;text-align:center;}
.grade-select{padding:6px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;font-weight:bold;}

/* Profile */
.pane{display:none; padding: 2rem 5%;}
.pane.active{display:block;}

@media(max-width:900px){
  .table-header{display:none;}
  .course-row{grid-template-columns:1fr 1fr; gap:5px;}
  .course-name{grid-column: span 2; font-weight:bold;}
}
</style>
</head>

const USERS_KEY='ase64_users';
const DATA_KEY='ase64_data';
const GRADES=['A','B+','B','C+','C','D+','D','F','W'];
const GRADE_POINTS={'A':4,'B+':3.5,'B':3,'C+':2.5,'C':2,'D+':1.5,'D':1,'F':0,'W':null};

let currentUser=null;
let grades={}; // { code: { grade: 'A', term: '1/66' } }
let freeData={};

const app=document.getElementById('app');

// --- Storage Functions (คงเดิม) ---
async function getUsers(){ try{return JSON.parse(localStorage.getItem(USERS_KEY)||'{}')}catch(e){return {}} }
async function saveUsers(u){ localStorage.setItem(USERS_KEY,JSON.stringify(u)); }
async function loadStudentData(sid){
  try{const r=JSON.parse(localStorage.getItem(DATA_KEY+':'+sid)||'{}'); return {grades:r.grades||{}, free:r.free||{}};}
  catch(e){return {grades:{},free:{}}}
}
async function saveStudentData(sid){ localStorage.setItem(DATA_KEY+':'+sid, JSON.stringify({grades, free:freeData})); }

// --- Logic (ปรับให้รองรับช่อง Term) ---
function calcGPA(){
  let totalPoints=0, totalCredits=0;
  GROUPS.forEach(g=>g.sub.forEach(sub=>{
    sub.courses.forEach(c=>{
      const d = grades[c.code];
      if(d && d.grade && d.grade!=='W'){
        totalPoints += (GRADE_POINTS[d.grade]*c.credit); totalCredits += c.credit;
      }
    });
    if(sub.canAdd && freeData[sub.id]){
      freeData[sub.id].forEach(fc=>{
        if(fc.grade && fc.grade!=='W'){
          totalPoints += (GRADE_POINTS[fc.grade]*fc.credit); totalCredits += fc.credit;
        }
      });
    }
  }));
  return totalCredits ? totalPoints/totalCredits : 0;
}

function calcPassedCredits(){
  let total=0;
  GROUPS.forEach(g=>g.sub.forEach(sub=>{
    sub.courses.forEach(c=>{ if(grades[c.code] && !['F','W',''].includes(grades[c.code].grade)) total+=c.credit; });
    if(sub.canAdd && freeData[sub.id]){
      freeData[sub.id].forEach(fc=>{ if(!['F','W',''].includes(fc.grade)) total+=fc.credit; });
    }
  }));
  return total;
}

// --- Render (หน้าจอหลัก) ---

function renderCurriculum(){
  const pane=document.getElementById('pane-curriculum');
  let html='';
  GROUPS.forEach(g=>{
    html+=`
    <div class="group-wrap">
      <div class="group-card">
        <div class="group-header">
          <div class="group-title">${g.icon} ${g.label} (ต้องการ ${g.minCredit} น.)</div>
        </div>
        <div class="group-body">
          ${g.sub.map(sub=>`
            <div style="padding:10px 1.5rem; background:#f0f7f2; font-weight:bold; font-size:14px; border-bottom:1px solid var(--border)">${sub.label}</div>
            <div class="table-header">
              <div>ผ่าน</div><div>รหัสวิชา</div><div>ชื่อวิชา</div><div>หน่วยกิต</div><div>ปี/เทอม</div><div>เกรด</div>
            </div>
            ${sub.courses.map(c=>{
              const saved = grades[c.code] || {grade:'', term:''};
              const isDone = saved.grade && !['F','W'].includes(saved.grade);
              return `
              <div class="course-row">
                <div class="check-box ${isDone?'done':''}" onclick="quickToggle('${c.code}')">
                  ${isDone?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>':''}
                </div>
                <div style="font-family:monospace; font-weight:bold;">${c.code}</div>
                <div class="course-name">${c.name}</div>
                <div style="text-align:center">${c.credit}</div>
                <div><input type="text" class="term-input" placeholder="เช่น 1/66" value="${saved.term}" onchange="updateData('${c.code}', 'term', this.value)"></div>
                <div>
                  <select class="grade-select" onchange="updateData('${c.code}', 'grade', this.value)">
                    <option value="">-</option>
                    ${GRADES.map(grade=>`<option value="${grade}" ${saved.grade===grade?'selected':''}>${grade}</option>`).join('')}
                  </select>
                </div>
              </div>`;
            }).join('')}
            
            ${sub.canAdd ? `
              <div id="free-${sub.id}">
                ${(freeData[sub.id]||[]).map((fc, idx)=>`
                  <div class="course-row" style="background:#fffcf5">
                    <div class="check-box ${fc.grade && !['F','W'].includes(fc.grade)?'done':''}"></div>
                    <div><input type="text" class="term-input" style="width:100%" value="${fc.code}" onchange="updateFree('${sub.id}', ${idx}, 'code', this.value)"></div>
                    <div><input type="text" class="term-input" style="width:100%; text-align:left;" value="${fc.name}" onchange="updateFree('${sub.id}', ${idx}, 'name', this.value)"></div>
                    <div style="text-align:center">${fc.credit}</div>
                    <div><input type="text" class="term-input" value="${fc.term||''}" onchange="updateFree('${sub.id}', ${idx}, 'term', this.value)"></div>
                    <div>
                      <select class="grade-select" onchange="updateFree('${sub.id}', ${idx}, 'grade', this.value)">
                        <option value="">-</option>
                        ${GRADES.map(grade=>`<option value="${grade}" ${fc.grade===grade?'selected':''}>${grade}</option>`).join('')}
                      </select>
                      <button onclick="removeFree('${sub.id}', ${idx})" style="border:none; background:none; color:red; cursor:pointer; font-weight:bold; margin-left:5px;">×</button>
                    </div>
                  </div>
                `).join('')}
                <div style="padding: 10px 1.5rem;"><button class="btn-primary" style="padding:5px 15px; font-size:12px;" onclick="addFreeRow('${sub.id}')">+ เพิ่มวิชา</button></div>
              </div>
            ` : ''}
          `).join('')}
        </div>
      </div>
    </div>`;
  });
  pane.innerHTML=html;
}

// --- Interaction Functions ---
async function updateData(code, field, val){
  if(!grades[code]) grades[code] = {grade:'', term:''};
  grades[code][field] = val;
  await saveStudentData(currentUser.sid);
  updateSummaryUI();
}

async function quickToggle(code){
  if(!grades[code] || grades[code].grade === '') {
    if(!grades[code]) grades[code] = {grade:'A', term:''};
    else grades[code].grade = 'A';
  } else {
    grades[code].grade = '';
  }
  await saveStudentData(currentUser.sid);
  renderCurriculum();
  updateSummaryUI();
}

function addFreeRow(subId){
  if(!freeData[subId]) freeData[subId] = [];
  freeData[subId].push({code:'', name:'วิชาเลือกใหม่', credit:3, grade:'', term:''});
  renderCurriculum();
}

async function updateFree(subId, idx, field, val){
  freeData[subId][idx][field] = val;
  await saveStudentData(currentUser.sid);
  updateSummaryUI();
}

async function removeFree(subId, idx){
  freeData[subId].splice(idx,1);
  await saveStudentData(currentUser.sid);
  renderCurriculum();
  updateSummaryUI();
}

function updateSummaryUI(){
  document.getElementById('s-passed').textContent = calcPassedCredits();
  document.getElementById('s-gpa').textContent = calcGPA().toFixed(2);
}

  app.innerHTML = `<div class="auth-bg"><div class="auth-card">
    <div class="auth-logo"><div class="auth-title">เข้าสู่ระบบตรวจสอบการเรียน</div></div>
    <div class="field"><label>รหัสนิสิต</label><input id="l-id" placeholder="6510450000"/></div>
    <div class="field"><label>เบอร์โทรศัพท์ (Password)</label><input id="l-pw" type="password" placeholder="เบอร์โทร"/></div>
    <button class="btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div style="text-align:center; margin-top:1rem; font-size:13px; color:var(--muted);">ยังไม่มีบัญชี? <button onclick="renderRegister()" style="background:none; border:none; color:var(--green); font-weight:bold; cursor:pointer;">สมัครสมาชิก</button></div>
  </div></div>`;
}

async function doLogin(){
  const sid=document.getElementById('l-id').value;
  const pw=document.getElementById('l-pw').value;
  const users=await getUsers();
  if(users[sid] && users[sid].phone === pw){
    currentUser = {...users[sid], sid};
    const d = await loadStudentData(sid);
    grades = d.grades; freeData = d.free;
    renderMain();
  } else { alert('ข้อมูลไม่ถูกต้อง'); }
}

function renderRegister(){
  app.innerHTML = `<div class="auth-bg"><div class="auth-card">
    <div class="auth-title">สมัครสมาชิก</div>
    <div class="field"><label>ชื่อ</label><input id="r-fn"/></div>
    <div class="field"><label>นามสกุล</label><input id="r-ln"/></div>
    <div class="field"><label>รหัสนิสิต</label><input id="r-id"/></div>
    <div class="field"><label>เบอร์โทรศัพท์</label><input id="r-pw"/></div>
    <button class="btn-primary" onclick="doRegister()">ยืนยันสมัครสมาชิก</button>
  </div></div>`;
}

async function doRegister(){
  const fn=document.getElementById('r-fn').value;
  const ln=document.getElementById('r-ln').value;
  const sid=document.getElementById('r-id').value;
  const pw=document.getElementById('r-pw').value;
  const users=await getUsers();
  users[sid] = {fname:fn, lname:ln, phone:pw};
  await saveUsers(users);
  alert('สมัครสำเร็จ'); renderLogin();
}

function switchTab(id){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  if(id==='profile') renderProfile();
}

function renderProfile(){
  const p = document.getElementById('pane-profile');
  p.innerHTML = `<div class="sum-card" style="max-width:500px; margin:0 auto; text-align:left;">
    <h3>ข้อมูลส่วนตัว</h3><hr style="margin:10px 0;">
    <p><b>ชื่อ-นามสกุล:</b> ${currentUser.fname} ${currentUser.lname}</p>
    <p><b>รหัสนิสิต:</b> ${currentUser.sid}</p>
    <p><b>สาขา:</b> เกษตรและสิ่งแวดล้อมศึกษา</p>
    <p><b>เบอร์โทรศัพท์:</b> ${currentUser.phone}</p>
  </div>`;
}

renderLogin();
</script>
</body>
</html>

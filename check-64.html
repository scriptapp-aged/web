<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบตรวจสอบการเรียนตามหลักสูตร - เกษตรและสิ่งแวดล้อมศึกษา</title>
<link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Reset & Global Style ===== */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1b6b35;/* สีเขียวหลัก */
  --green-light:#2d9b50;
  --green-pale:#e8f5ec;
  --green-mid:#c2e8cc;
  --gold:#e8a020;
  --sky:#1976d2;
  --coral:#e05c3a;
  --bg:#f4f9f6;
  --white:#fff;
  --text:#1a2e1e;
  --muted:#5a7a62;
  --border:#c8e0cf;
  --shadow:0 4px 6px rgba(0,0,0,0.07);
  --radius-lg:16px;
  --radius-md:10px;
  --radius-sm:8px;
  --font-mali:'Mali', cursive;/* ฟอนต์ Mali */
}
body{font-family:var(--font-mali);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}

/* ===== AUTH STYLES (คงโครงสร้างเดิม แต่ปรับฟอนต์) ===== */
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
  background:linear-gradient(135deg,#e8f5ec 0%,#c2e8cc 40%,#fdecc8 100%);}
.auth-card{background:var(--white);border-radius:24px;padding:2.5rem;width:100%;max-width:420px;
  box-shadow:0 8px 40px rgba(27,107,53,0.13);border:2px solid var(--border);}
.auth-logo{text-align:center;margin-bottom:1.75rem;}
.auth-title{font-size:20px;font-weight:700;color:var(--green);margin-bottom:5px;}
.auth-sub{font-size:13px;color:var(--muted);}
.field{margin-bottom:1.2rem;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--green);margin-bottom:6px;}
.field input,.field select{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);
  font-family:var(--font-mali);font-size:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-auth{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);
  font-family:var(--font-mali);font-size:16px;font-weight:700;cursor:pointer;transition:.2s;}
.btn-auth:hover{opacity:.9;transform:translateY(-1px);}

/* ===== MAIN LAYOUT STYLES ===== */
.main-wrap{min-height:100vh;display:flex;flex-direction:column;}
.container-full{max-width:1400px;margin:0 auto;width:100%;padding:1rem;}

/* Top Header */
.topbar{padding:1.5rem 1rem;text-align:center;}
.header-box{background:var(--green);border-radius:var(--radius-lg);padding:1.5rem;color:#fff;}
.topbar-title .t1{font-size:18px;font-weight:700;letter-spacing:0.5px;}
.topbar-title .t2{font-size:12px;opacity:0.8;margin-top:2px;}

/* User Card */
.user-card{background:#fff;border-radius:var(--radius-lg);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;}
.user-info-flex{display:flex;align-items:center;gap:15px;}
.user-avatar{width:50px;height:50px;border-radius:50%;background:var(--green-pale);display:flex;align-items:center;justify-content:center;color:var(--green);font-weight:bold;font-size:20px;border:1px solid var(--border);}
.btn-logout{background:none;border:1px solid #ddd;color:#333;padding:8px 16px;border-radius:20px;font-family:var(--font-mali);cursor:pointer;font-size:12px;transition:0.2s;}
.btn-logout:hover{background:#f5f5f5;border-color:#ccc;}

/* Summary Section (NEW) */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:1.5rem;}
.sum-box{background:var(--white);border-radius:var(--radius-md);padding:1.5rem 1rem;text-align:center;box-shadow:var(--shadow);}
.sum-box .val{font-size:36px;font-weight:700;color:var(--green);line-height:1;}
.sum-box .lbl{font-size:12px;color:var(--muted);margin-top:10px;font-weight:600;}
.sum-box.remaining .val{color:var(--coral);}
.sum-box.gpa .val{color:var(--sky);}

/* Progress */
.prog-card{background:var(--white);border-radius:var(--radius-md);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1.5rem;}
.prog-label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:600;}
.prog-bar{height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;background:var(--green);width:0;transition:width 0.5s;}

/* Tabs */
.tabs-wrap{display:flex;gap:10px;margin-bottom:1.5rem;justify-content:center;}
.tab-btn{background:var(--white);border:1px solid #ddd;padding:10px 20px;border-radius:20px;font-family:var(--font-mali);cursor:pointer;font-size:13px;transition:0.2s;}
.tab-btn:hover{background:var(--green-pale);}
.tab-btn.active{background:var(--green);color:#fff;border-color:var(--green);}

/* Group & Table */
.curriculum-body{display:grid;gap:1.5rem;}
.group-card{background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow);padding:1.5rem;}
.group-header{margin-bottom:1.5rem;border-left:4px solid var(--green);padding-left:15px;}
.group-title{font-size:16px;font-weight:700;}
.group-meta{font-size:12px;color:var(--muted);margin-top:2px;}

.sub-group-header{padding:10px 1.5rem; background:#f8faf9; border-top:1px solid var(--border); border-bottom:1px solid var(--border); font-size:13px; font-weight:700; color:var(--green); display:flex; justify-content:space-between; align-items:center;}

/* Table Structure */
.table-responsive{overflow-x:auto;}
.curriculum-table{width:100%;border-collapse:collapse;min-width:900px;}
.curriculum-table th, .curriculum-table td{padding:12px 1rem;border-bottom:1px solid var(--border);font-size:13px;}
.curriculum-table th{background:#fafafa;font-weight:bold;text-align:left;color:var(--muted);}
.curriculum-table td{vertical-align:middle;}
.curriculum-table th.center, .curriculum-table td.center{text-align:center;}

/* Checkbox & Inputs */
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.check-box.done{background:var(--green);border-color:var(--green);}
.term-input{width:90px;padding:6px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font-mali);font-size:12px;text-align:center;}
.grade-select{padding:6px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font-mali);font-size:13px;font-weight:bold;}

/* Action Buttons (add/remove) */
.btn-free-add{background:var(--green); color:#fff; border:none; padding:8px 16px; border-radius:20px; font-family:var(--font-mali); font-size:12px; cursor:pointer; margin: 15px;}
.remove-btn{border:none; background:none; color:red; cursor:pointer; font-size:18px; margin-left:10px;}

/* Profile Pane */
.pane{display:none;}
.pane.active{display:block;}
.profile-card{background:var(--white); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:2rem; max-width:600px; margin:2rem auto;}
.profile-card table {width:100%; border-collapse: collapse;}
.profile-card th {text-align: left; color: var(--muted); padding: 10px 0; width: 150px;}
.profile-card td {padding: 10px 0;}

@media(max-width:900px){
  .summary-row{grid-template-columns:1fr;gap:10px;}
}
</style>
</head>

  ]},
];

const TOTAL_NEEDED_CREDITS = 136;
const USERS_KEY='ase64_users_v2';
const DATA_KEY='ase64_data_v2';
const GRADES=['A','B+','B','C+','C','D+','D','F','W'];
const GRADE_POINTS={'A':4,'B+':3.5,'B':3,'C+':2.5,'C':2,'D+':1.5,'D':1,'F':0,'W':null};

let currentUser=null;
let grades={}; // { code: { grade: 'A', term: '1/66' } }
let freeData={};

const app=document.getElementById('app');

// --- Storage Functions ---
async function getUsers(){ try{return JSON.parse(localStorage.getItem(USERS_KEY)||'{}')}catch(e){return {}} }
async function saveUsers(u){ localStorage.setItem(USERS_KEY,JSON.stringify(u)); }
async function loadStudentData(sid){
  try{const r=JSON.parse(localStorage.getItem(DATA_KEY+':'+sid)||'{}'); return {grades:r.grades||{}, free:r.free||{}};}
  catch(e){return {grades:{},free:{}}}
}
async function saveStudentData(sid){ localStorage.setItem(DATA_KEY+':'+sid, JSON.stringify({grades, free:freeData})); }

// --- Logic (gpa/credits) ---
function calcGPA(){
  let totalPoints=0, totalCredits=0;
  GROUPS.forEach(g=>g.sub.forEach(sub=>{
    sub.courses.forEach(c=>{
      const d = grades[c.code];
      if(d && d.grade && GRADE_POINTS[d.grade] !== null){
        totalPoints += (GRADE_POINTS[d.grade]*c.credit); totalCredits += c.credit;
      }
    });
    if(freeData[sub.id]){
      freeData[sub.id].forEach(fc=>{
        if(fc.grade && GRADE_POINTS[fc.grade] !== null){
          totalPoints += (GRADE_POINTS[fc.grade]*fc.credit); totalCredits += fc.credit;
        }
      });
    }
  }));
  return totalCredits ? totalPoints/totalCredits : 0;
}

function calcPassedCredits(){
  let total=0;
  GROUPS.forEach(g=>g.sub.forEach(sub=>{
    sub.courses.forEach(c=>{ if(grades[c.code] && !['F','W',''].includes(grades[c.code].grade)) total+=c.credit; });
    if(freeData[sub.id]){
      freeData[sub.id].forEach(fc=>{ if(!['F','W',''].includes(fc.grade)) total+=fc.credit; });
    }
  }));
  return total;
}

  renderCurriculum();

}

// --- Render Curriculum Table ---
function renderCurriculum(){
  const pane=document.getElementById('pane-curriculum');
  let html='';
  GROUPS.forEach(g=>{
    html+=`
    <div class="group-card">
      <div class="group-header">
        <div class="group-title">${g.label}</div>
        <div class="group-meta">ต้องการ ${g.minCredit} หน่วยกิต</div>
      </div>
      <div class="table-responsive">
        <table class="curriculum-table">
          <thead>
            <tr>
              <th>ผ่าน</th>
              <th>รหัสวิชา</th>
              <th>ชื่อวิชา</th>
              <th class="center">หน่วยกิต</th>
              <th class="center">เทอม/ปีที่เรียน</th>
              <th class="center">เกรด</th>
            </tr>
          </thead>
          <tbody>
            ${g.sub.map(sub=>`
              <tr class="sub-group-header">
                <td colspan="6">${sub.label} (ต้องการ ${sub.minCredit} น.)</td>
              </tr>
              ${sub.courses.map(c=>{
                const saved = grades[c.code] || {grade:'', term:''};
                const isDone = saved.grade && !['F','W'].includes(saved.grade);
                return `
                <tr>
                  <td>
                    <div class="check-box ${isDone?'done':''}" onclick="toggleDone('${c.code}')">
                      ${isDone?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>':''}
                    </div>
                  </td>
                  <td style="font-family:monospace;">${c.code}</td>
                  <td>${c.name}</td>
                  <td class="center">${c.credit}</td>
                  <td class="center"><input type="text" class="term-input" placeholder="เช่น 1/66" value="${saved.term}" onchange="updateRow('${c.code}', 'term', this.value)"></td>
                  <td class="center">
                    <select class="grade-select" onchange="updateRow('${c.code}', 'grade', this.value)">
                      <option value="">-</option>
                      ${GRADES.map(grade=>`<option value="${grade}" ${saved.grade===grade?'selected':''}>${grade}</option>`).join('')}
                    </select>
                  </td>
                </tr>`;
              }).join('')}
              
              ${sub.canAdd ? `
                ${(freeData[sub.id]||[]).map((fc, idx)=>`
                  <tr style="background:#fffcf8">
                    <td><div class="check-box ${fc.grade && !['F','W'].includes(fc.grade)?'done':''}"></div></td>
                    <td><input type="text" class="term-input" style="width:100%" value="${fc.code}" placeholder="รหัสวิชา" onchange="updateFreeRow('${sub.id}', ${idx}, 'code', this.value)"></td>
                    <td><input type="text" class="term-input" style="width:100%; text-align:left;" value="${fc.name}" placeholder="ชื่อวิชาเสรี/เลือก" onchange="updateFreeRow('${sub.id}', ${idx}, 'name', this.value)"></td>
                    <td class="center"><input type="number" class="term-input" style="width:60px" value="${fc.credit}" onchange="updateFreeRow('${sub.id}', ${idx}, 'credit', this.value)"></td>
                    <td class="center"><input type="text" class="term-input" placeholder="1/66" value="${fc.term||''}" onchange="updateFreeRow('${sub.id}', ${idx}, 'term', this.value)"></td>
                    <td class="center">
                      <select class="grade-select" onchange="updateFreeRow('${sub.id}', ${idx}, 'grade', this.value)">
                        <option value="">-</option>
                        ${GRADES.map(grade=>`<option value="${grade}" ${fc.grade===grade?'selected':''}>${grade}</option>`).join('')}
                      </select>
                      <button onclick="removeFreeRow('${sub.id}', ${idx})" class="remove-btn">×</button>
                    </div>
                  </td>
                `).join('')}
                <tr><td colspan="6"><button class="btn-free-add" onclick="addFreeRow('${sub.id}')">+ เพิ่มวิชา</button></td></tr>
              ` : ''}
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  });
  pane.innerHTML=html;
}

// --- Render Profile Pane ---
function renderProfile(){
  const p = document.getElementById('pane-profile');
  p.innerHTML = `<div class="profile-card">
    <div style="font-weight:bold; color:var(--green); font-size:18px; margin-bottom:15px; border-bottom:1px solid #ddd; padding-bottom:10px;">ข้อมูลนิสิต</div>
    <table>
      <tr><th>ชื่อ-นามสกุล</th><td>: ${currentUser.fname} ${currentUser.lname}</td></tr>
      <tr><th>รหัสนิสิต</th><td>: ${currentUser.sid}</td></tr>
      <tr><th>หลักสูตร</th><td>: วิทยาศาสตรบัณฑิต (เกษตรและสิ่งแวดล้อมศึกษา)</td></tr>
      <tr><th>คณะ</th><td>: คณะศึกษาศาสตร์และพัฒนศาสตร์</td></tr>
      <tr><th>เบอร์โทรศัพท์</th><td>: ${currentUser.phone}</td></tr>
    </table>
  </div>`;
}

// --- Action Functions ---
async function updateRow(code, field, val){
  if(!grades[code]) grades[code] = {grade:'', term:''};
  grades[code][field] = val;
  await saveStudentData(currentUser.sid);
  renderMain(); // refresh summarize
}

async function toggleDone(code){
  if(!grades[code] || grades[code].grade === '') {
    if(!grades[code]) grades[code] = {grade:'A', term:''};
    else grades[code].grade = 'A';
  } else {
    grades[code].grade = ''; // reset
  }
  await saveStudentData(currentUser.sid);
  renderMain();
}

function addFreeRow(subId){
  if(!freeData[subId]) freeData[subId] = [];
  freeData[subId].push({code:'', name:'วิชาเลือกใหม่', credit:3, grade:'', term:''});
  renderCurriculum();
}

async function updateFreeRow(subId, idx, field, val){
  freeData[subId][idx][field] = (field==='credit') ? parseInt(val)||0 : val;
  await saveStudentData(currentUser.sid);
  renderMain();
}

async function removeFreeRow(subId, idx){
  freeData[subId].splice(idx,1);
  await saveStudentData(currentUser.sid);
  renderMain();
}

function switchPane(id){
  // Tab active
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id==='curriculum'?'tab-curr':'tab-profile').classList.add('active');
  // Pane visible
  document.getElementById('pane-curriculum').style.display = (id==='curriculum'?'block':'none');
  document.getElementById('pane-profile').style.display = (id==='profile'?'block':'none');
}

function logout(){ location.reload(); }

// --- Auth Rendering (คงโครงสร้างเดิม) ---
function renderLogin(){
  app.innerHTML = `<div class="auth-bg"><div class="auth-card">
    <div class="auth-logo"><div class="auth-title">เข้าสู่ระบบตรวจสอบการเรียน</div><div class="auth-sub">(เกษตรและสิ่งแวดล้อมศึกษา)</div></div>
    <div class="field"><label>รหัสนิสิต</label><input id="l-id" placeholder="ตัวเลข 10 หลัก"/></div>
    <div class="field"><label>เบอร์โทรศัพท์ (Password)</label><input id="l-pw" type="password" placeholder="เบอร์โทร"/></div>
    <button class="btn-auth" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div style="text-align:center; margin-top:1.5rem; font-size:13px;">ยังไม่มีบัญชี? <button onclick="renderRegister()" style="background:none; border:none; color:var(--green); font-weight:bold; cursor:pointer; font-family:var(--font-mali);">สมัครสมาชิก</button></div>
  </div></div>`;
}

async function doLogin(){
  const sid=document.getElementById('l-id').value.trim();
  const pw=document.getElementById('l-pw').value.trim();
  if(!sid || !pw){ alert('กรุณากรอกข้อมูลให้ครบ'); return; }
  const users=await getUsers();
  if(users[sid] && users[sid].phone === pw){
    currentUser = {...users[sid], sid};
    const d = await loadStudentData(sid);
    grades = d.grades; freeData = d.free;
    renderMain();
  } else { alert('รหัสนิสิตหรือเบอร์โทรไม่ถูกต้อง'); }
}

function renderRegister(){
  app.innerHTML = `<div class="auth-bg"><div class="auth-card">
    <div class="auth-title" style="text-align:center;">สมัครสมาชิก</div>
    <div class="row2"><div class="field"><label>ชื่อ</label><input id="r-fn"/></div><div class="field"><label>นามสกุล</label><input id="r-ln"/></div></div>
    <div class="field"><label>รหัสนิสิต</label><input id="r-id" placeholder="ตัวเลข 10 หลัก"/></div>
    <div class="field"><label>เบอร์โทรศัพท์ (เป็น Password)</label><input id="r-pw"/></div>
    <button class="btn-auth" onclick="doRegister()">สมัครสมาชิก</button>
    <div style="text-align:center; margin-top:1.5rem; font-size:13px;"><button onclick="renderLogin()" style="background:none; border:none; color:var(--green); font-weight:bold; cursor:pointer; font-family:var(--font-mali);">กลับหน้าล็อกอิน</button></div>
  </div></div>`;
}

async function doRegister(){
  const fn=document.getElementById('r-fn').value.trim();
  const ln=document.getElementById('r-ln').value.trim();
  const sid=document.getElementById('r-id').value.trim();
  const pw=document.getElementById('r-pw').value.trim();
  if(!fn || !ln || !sid || !pw){ alert('กรุณากรอกข้อมูลให้ครบ'); return; }
  const users=await getUsers();
  if(users[sid]){ alert('รหัสนิสิตนี้สมัครไปแล้ว'); return; }
  users[sid] = {fname:fn, lname:ln, phone:pw};
  await saveUsers(users);
  alert('สมัครสำเร็จ'); renderLogin();
}

// Start
renderLogin();
</script>

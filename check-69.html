<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบการเรียนตามหลักสูตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #fcfcfc;
            color: #334155;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 50px 40px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            text-align: center;
            border: 1px solid #f1f5f9;
        }

        h1 {
            font-size: 2.2rem;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        /* เส้นสถานะแบบพอดี */
        .progress-box {
            max-width: 400px;
            margin: 0 auto 40px;
        }
        .progress-text {
            font-size: 0.9rem;
            color: #3b82f6;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .progress-bar {
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 80%;
            height: 100%;
            background: #3b82f6;
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        /* นับถอยหลังที่ดูเด่นแบบพอดี */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .time-unit {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            min-width: 85px;
        }
        .time-num {
            display: block;
            font-size: 1.8rem;
            font-weight: 500;
            color: #1e293b;
        }
        .time-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* ส่วนประกาศสำหรับนิสิต */
        .student-notice {
            background: #eff6ff;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .notice-info {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #1e40af;
        }
        .btn-link {
            display: inline-block;
            background: #1e293b;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-link:hover {
            background: #334155;
        }

        .opening-info {
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>เราจะกลับมา</h1>
    <p class="subtitle">ระบบตรวจสอบการเรียนตามหลักสูตร (พ.ศ. 2564)</p>

    <div class="progress-box">
        <div class="progress-text">สถานะ: อยู่ระหว่างการพัฒนา</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="countdown">
        <div class="time-unit">
            <span class="time-num" id="days">00</span>
            <span class="time-label">วัน</span>
        </div>
        <div class="time-unit">
            <span class="time-num" id="hours">00</span>
            <span class="time-label">ชม.</span>
        </div>
        <div class="time-unit">
            <span class="time-num" id="minutes">00</span>
            <span class="time-label">นาที</span>
        </div>
        <div class="time-unit">
            <span class="time-num" id="seconds">00</span>
            <span class="time-label">วิ</span>
        </div>
    </div>

    <div class="student-notice">
        <p class="notice-info">สำหรับนิสิตปัจจุบัน โปรดใช้ระบบ หลักสูตรปรับปรุง พ.ศ. 2564</p>
        <a href="URL_ของระบบเก่า" class="btn-link">เข้าสู่ระบบเก่า (มคอ. 2564)</a>
    </div>

    <p class="opening-info">เปิดระบบวันที่ 20 เมษายน 2569 เวลา 01:00 น.</p>
</div>

<script>
    const target = new Date("April 20, 2026 01:00:00").getTime();

    setInterval(() => {
        const now = new Date().getTime();
        const diff = target - now;

        if (diff > 0) {
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
    }, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบการเรียนตามหลักสูตร - กำลังพัฒนา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #0ff; /* Cyan Neon */
            --secondary-neon: #bc13fe; /* Purple Neon */
            --bg-dark: #050509;
            --text-main: #fff;
            --text-muted: #8b9bb4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* ป้องกัน Scrollbar ของ Animated BG */
            position: relative;
        }

        /* --- Animated Background (ลูกเล่นพื้นหลัง) --- */
        #bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(32, 255, 255, .05) 25%, rgba(32, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(32, 255, 255, .05) 75%, rgba(32, 255, 255, .05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(32, 255, 255, .05) 25%, rgba(32, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(32, 255, 255, .05) 75%, rgba(32, 255, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* Particles effect */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            25% { opacity: 1; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.5; }
            75% { opacity: 1; }
        }

        /* --- Main Card (สไตล์ Glassmorphism) --- */
        .card {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            text-align: center;
            max-width: 800px;
            width: 90%;
            z-index: 10; /* ให้อยู่เหนือพื้นหลัง */
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        /* หัวข้อหลักเรืองแสง */
        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px var(--primary-neon),
                0 0 42px var(--primary-neon),
                0 0 82px var(--primary-neon);
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 7px #fff, 0 0 10px #fff, 0 0 21px var(--primary-neon); }
            100% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--primary-neon), 0 0 60px var(--primary-neon); }
        }

        .subtitle {
            font-size: 1.3rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 200;
        }

        .curriculum {
            font-size: 1.1rem;
            color: var(--primary-neon);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .status {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #ff4500; /* Orange-red for 'developing' */
            font-weight: 600;
            text-shadow: 0 0 10px #ff4500;
        }

        /* --- Countdown Style (สไตล์ Neon) --- */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            min-width: 100px;
            border: 1px solid rgba(188, 19, 254, 0.3); /* Purple border */
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }

        .time-num {
            display: block;
            font-size: 3rem;
            font-weight: 600;
            color: var(--secondary-neon);
            text-shadow: 0 0 10px var(--secondary-neon), 0 0 20px var(--secondary-neon);
        }

        .time-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Info and Button Section (ส่วนที่เพิ่มใหม่) --- */
        .student-info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .for-current-student {
            font-size: 1.2rem;
            color: #f59e0b; /* Amber color for warning/info */
            margin-bottom: 20px;
            font-weight: 400;
            text-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
        }

        .legacy-btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-family: 'Kanit', sans-serif;
            font-weight: 600;
            color: var(--primary-neon);
            background: transparent;
            border: 2px solid var(--primary-neon);
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .legacy-btn:hover {
            background: var(--primary-neon);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--primary-neon), 0 0 40px var(--primary-neon);
            transform: scale(1.05);
        }

        .opening-date {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #555;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .time-num { font-size: 2rem; }
            .time-box { min-width: 70px; padding: 10px; }
            .card { padding: 30px; }
        }
    </style>
</head>
<body>

<div id="bg-animation"></div>

<div class="card">
    <h1>เราจะกลับมา</h1>
    <p class="subtitle">ระบบตรวจสอบการเรียนตามหลักสูตร</p>
    <p class="curriculum">(หลักสูตรปรับปรุง พ.ศ. 2564)</p>
    
    <p class="status">อยู่ระหว่างการพัฒนา</p>
    
    <div id="countdown">
        <div class="time-box">
            <span class="time-num" id="days">00</span>
            <span class="time-label">วัน</span>
        </div>
        <div class="time-box">
            <span class="time-num" id="hours">00</span>
            <span class="time-label">ชม.</span>
        </div>
        <div class="time-box">
            <span class="time-num" id="minutes">00</span>
            <span class="time-label">นาที</span>
        </div>
        <div class="time-box">
            <span class="time-num" id="seconds">00</span>
            <span class="time-label">วิ</span>
        </div>
    </div>

    <div class="student-info">
        <p class="for-current-student">
            ⚠️ สำหรับนิสิตปัจจุบัน โปรดใช้ระบบ หลักสูตรปรับปรุง พ.ศ. 2564
        </p>
        <a href="#" class="legacy-btn">เข้าสู่ระบบเก่า (มคอ. 2564)</a>
    </div>

    <div class="opening-date">
        กำหนดเปิดระบบใหม่: 20 เมษายน 2569 เวลา 01:00 น.
    </div>
</div>

<script>
    // --- Create Particles (ลูกเล่นอนุภาคแสง) ---
    function createParticles() {
        const bg = document.getElementById('bg-animation');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            // สุ่มขนาดและตำแหน่ง
            const size = Math.random() * 5 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.left = Math.random() * 100 + '%';
            // สุ่มระยะเวลา animation
            particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            
            bg.appendChild(particle);
        }
    }
    createParticles(); // เรียกใช้งาน

    // --- Countdown Timer Logic ---
    // ตั้งค่าวันที่เปิดระบบ (Year, Month Index (0-11), Day, Hour, Minute, Second)
    // เดือนเมษายน คือ Index 3
    const targetDate = new Date(2026, 3, 20, 1, 0, 0).getTime();

    const countdownTimer = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        // คำนวณ วัน ชม. นาที วินาที
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // แสดงผล
        document.getElementById("days").innerText = days.toString().padStart(2, '0');
        document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
        document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
        document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

        // เมื่อถึงเวลาที่กำหนด
        if (distance < 0) {
            clearInterval(countdownTimer);
            document.querySelector(".card").innerHTML = "<h1>ระบบพร้อมใช้งานแล้ว</h1><p>กรุณารีเฟรชหน้าจอ</p>";
        }
    }, 1000);
</script>

</body>
</html>

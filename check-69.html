<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบการเรียนตามหลักสูตร - อยู่ระหว่างการพัฒนา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #ffffff; /* พื้นหลังขาวล้วน */
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-wrapper {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        /* หัวข้อหลัก: ขยายใหญ่ขึ้นตามคำขอ */
        h1 {
            font-size: 4rem; /* ขยายใหญ่มาก */
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        /* ส่วนข้อมูลระบบ: ย้ายมาไว้ข้างบนนับถอยหลัง */
        .system-info-block {
            margin-bottom: 50px;
        }

        .system-title {
            font-size: 2.2rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .curriculum-date-info {
            font-size: 1.5rem;
            color: #475569;
            line-height: 1.6;
        }

        /* นับถอยหลังแบบมี : คั่น และขยายใหญ่ */
        .countdown-frame {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 60px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-digit {
            font-size: 6rem; /* ตัวเลขใหญ่มากเด่นชัด */
            font-weight: 600;
            color: #2563eb;
            line-height: 1;
        }

        .separator {
            font-size: 5rem;
            font-weight: 600;
            color: #cbd5e1;
            padding-bottom: 30px; /* ปรับระดับเครื่องหมาย : */
        }

        .label-text {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-top: 10px;
        }

        /* ส่วนล่างสุด: ประกาศสำหรับนิสิตปัจจุบัน */
        .portal-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #f1f5f9;
        }

        .portal-message {
            font-size: 1.4rem;
            color: #475569;
            margin-bottom: 25px;
        }

        .btn-legacy-system {
            display: inline-block;
            background-color: #1e293b;
            color: #ffffff;
            padding: 18px 50px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.4rem;
            transition: all 0.2s ease;
        }

        .btn-legacy-system:hover {
            background-color: #334155;
            transform: scale(1.03);
        }

        /* ปรับแต่งสำหรับหน้าจอมือถือ */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .time-digit { font-size: 4rem; }
            .separator { font-size: 3.5rem; }
            .system-title { font-size: 1.8rem; }
            .curriculum-date-info { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>เรากำลังพัฒนา</h1>

    <div class="system-info-block">
        <p class="system-title">ระบบตรวจสอบการเรียนตามหลักสูตร</p>
        <p class="curriculum-date-info">
            - หลักสูตรปรับปรุง พ.ศ. 2569 - <br>
            เปิดระบบวันที่ 20 เมษายน 2569 เวลา 01:00 น.
        </p>
    </div>

    <div class="countdown-frame">
        <div class="time-box">
            <span class="time-digit" id="days">00</span>
            <span class="label-text">วัน</span>
        </div>
        <div class="separator">:</div>
        <div class="time-box">
            <span class="time-digit" id="hours">00</span>
            <span class="label-text">ชม.</span>
        </div>
        <div class="separator">:</div>
        <div class="time-box">
            <span class="time-digit" id="minutes">00</span>
            <span class="label-text">นาที</span>
        </div>
        <div class="separator">:</div>
        <div class="time-box">
            <span class="time-digit" id="seconds">00</span>
            <span class="label-text">วิ</span>
        </div>
    </div>

    <div class="portal-section">
        <p class="portal-message">สำหรับนิสิตปัจจุบัน โปรดใช้ระบบ หลักสูตรปรับปรุง พ.ศ. 2564</p>
        <a href="ใส่_URL_ของระบบเก่าที่นี่" class="btn-legacy-system">เข้าสู่ระบบ (มคอ. 2564)</a>
    </div>
</div>

<script>
    // ตั้งค่าเป้าหมาย: 20 เมษายน 2569 เวลา 01:00 น.
    const target = new Date(2026, 3, 20, 1, 0, 0).getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const diff = target - now;

        if (diff > 0) {
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        } else {
            document.querySelector(".countdown-frame").innerHTML = "<h2>เปิดให้บริการแล้ว</h2>";
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>

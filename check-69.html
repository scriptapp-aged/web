<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบการเรียนตามหลักสูตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #ffffff; /* พื้นหลังขาวล้วน */
            color: #334155;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content-wrapper {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #1e293b;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #64748b;
            margin-bottom: 5px;
        }

        .curriculum {
            font-size: 1.2rem;
            color: #1e293b;
            font-weight: 500;
            margin-bottom: 40px;
        }

        /* นับถอยหลังแบบเน้นๆ แต่ไม่ตะโกน */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 50px;
        }

        .time-item {
            text-align: center;
        }

        .time-num {
            display: block;
            font-size: 3.5rem;
            font-weight: 600;
            color: #3b82f6; /* สีฟ้าให้ความรู้สึกโปร่งสบาย */
            line-height: 1;
        }

        .time-label {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 8px;
        }

        /* ส่วนประกาศนิสิต */
        .notice-area {
            margin-bottom: 40px;
        }

        .notice-text {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 20px;
        }

        .btn-portal {
            display: inline-block;
            background-color: #1e293b;
            color: #ffffff;
            padding: 12px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 400;
            transition: all 0.2s ease;
        }

        .btn-portal:hover {
            background-color: #334155;
            transform: translateY(-1px);
        }

        .system-date {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-top: 20px;
        }

        /* สำหรับมือถือ */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .time-num { font-size: 2.5rem; }
            .countdown { gap: 15px; }
        }
    </style>
</head>
<body>

<div class="content-wrapper">
    <h1>เราจะกลับมา</h1>
    <p class="subtitle">ระบบตรวจสอบการเรียนตามหลักสูตร</p>
    <p class="curriculum">- หลักสูตรปรับปรุง พ.ศ. 2564 -</p>

    <div class="countdown">
        <div class="time-item">
            <span class="time-num" id="days">00</span>
            <span class="time-label">วัน</span>
        </div>
        <div class="time-item">
            <span class="time-num" id="hours">00</span>
            <span class="time-label">ชม.</span>
        </div>
        <div class="time-item">
            <span class="time-num" id="minutes">00</span>
            <span class="time-label">นาที</span>
        </div>
        <div class="time-item">
            <span class="time-num" id="seconds">00</span>
            <span class="time-label">วิ</span>
        </div>
    </div>

    <div class="notice-area">
        <p class="notice-text">สำหรับนิสิตปัจจุบัน โปรดใช้ระบบ หลักสูตรปรับปรุง พ.ศ. 2564</p>
        <a href="#" class="btn-portal">เข้าสู่ระบบ (มคอ. 2564)</a>
    </div>

    <p class="system-date">เปิดระบบวันที่ 20 เมษายน 2569 เวลา 01:00 น. | อยู่ระหว่างการพัฒนา</p>
</div>

<script>
    const targetDate = new Date("April 20, 2026 01:00:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff > 0) {
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        } else {
            document.querySelector(".countdown").innerHTML = "<h2>พร้อมเปิดให้บริการแล้ว</h2>";
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>

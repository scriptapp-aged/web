<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบการเรียนตามหลักสูตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            border-top: 8px solid #2c3e50;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        .status-badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .main-text {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
        .footer-info {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid #dee2e6;
        }
        .date-time {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-top: 0.5rem;
            display: block;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>เราจะกลับมา</h1>
    <div class="status-badge">🚧 อยู่ระหว่างการพัฒนา</div>
    
    <div class="main-text">
        <strong>ระบบตรวจสอบการเรียนตามหลักสูตร</strong><br>
        หลักสูตรปรับปรุง พ.ศ. 2564
    </div>

    <div class="footer-info">
        เปิดระบบวันที่
        <span class="date-time">20 เมษายน 2569 | เวลา 01:00 น.</span>
    </div>
</div>

</body>
</html>

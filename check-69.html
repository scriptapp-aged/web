<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบการเรียนตามหลักสูตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #ffffff; /* พื้นหลังขาวล้วนตามต้องการ */
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3.5rem; /* ขยายใหญ่ขึ้น */
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .status-text {
            font-size: 1.5rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        /* ย้ายข้อมูลระบบมาไว้ด้านบนนับถอยหลัง */
        .system-info {
            margin-bottom: 40px;
        }

        .system-name {
            font-size: 1.8rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .curriculum-date {
            font-size: 1.3rem;
            color: #475569;
        }

        /* นับถอยหลังแบบมี : คั่น */
        .countdown-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .time-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .digit {
            font-size: 5rem; /* ตัวเลขใหญ่เด่น */
            font-weight: 600;
            color: #2563eb;
            line-height: 1;
        }

        .separator {
            font-size: 4rem;
            font-weight: 600;
            color: #cbd5e1;
            padding-bottom: 25px; /* ปรับระดับเครื่องหมาย : */
        }

        .label {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-top: 10px;
        }

        /* ส่วนล่าง: ปุ่มสำหรับนิสิตปัจจุบัน */
        .student-portal {
            margin-top: 20px;
        }

        .portal-msg {
            font-size: 1.3rem;
            color: #475569;
            margin-bottom: 20px;
        }

        .btn-old-system {
            display: inline-block;
            background-color: #1e293b;
            color: #ffffff;
            padding: 16px 45px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.2s ease;
        }

        .btn-old-system:hover {
            background-color: #334155;
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .digit { font-size: 3rem; }
            .separator { font-size: 2.5rem; }
            .system-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>เราจะกลับมา</h1>
    <p class="status-text">เรากำลังพัฒนา</p>

    <div class="system-info">
        <p class="system-name">ระบบตรวจสอบการเรียนตามหลักสูตร</p>
        <p class="curriculum-date">
            - หลักสูตรปรับปรุง พ.ศ. 2569 - <br>
            เปิดระบบวันที่ 20 เมษายน 2569 เวลา 01:00 น.
        </p>
    </div>

    <div class="countdown-container">
        <div class="time-group">
            <span class="digit" id="days">00</span>
            <span class="label">วัน</span>
        </div>
        <div class="separator">:</div>
        <div class="time-group">
            <span class="digit" id="hours">00</span>
            <span class="label">ชม.</span>
        </div>
        <div class="separator">:</div>
        <div class="time-group">
            <span class="digit" id="minutes">00</span>
            <span class="label">นาที</span>
        </div>
        <div class="separator">:</div>
        <div class="time-group">
            <span class="digit" id="seconds">00</span>
            <span class="label">วิ</span>
        </div>
    </div>

    <div class="student-portal">
        <p class="portal-msg">สำหรับนิสิตปัจจุบัน โปรดใช้ระบบ หลักสูตรปรับปรุง พ.ศ. 2564</p>
        <a href="#" class="btn-old-system">เข้าสู่ระบบ (มคอ. 2564)</a>
    </div>
</div>

<script>
    // เป้าหมาย 20 เมษายน 2569 เวลา 01:00 น.
    const target = new Date(2026, 3, 20, 1, 0, 0).getTime();

    function update() {
        const now = new Date().getTime();
        const diff = target - now;

        if (diff > 0) {
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        } else {
            document.querySelector(".countdown-container").innerHTML = "<h2>เปิดให้บริการแล้ว</h2>";
        }
    }

    setInterval(update, 1000);
    update();
</script>

</body>
</html>

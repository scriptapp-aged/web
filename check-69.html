<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบการเรียนตามหลักสูตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 1000px; /* ขยายความกว้าง */
            text-align: center;
            padding: 60px 40px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
        }

        h1 {
            font-size: 4.5rem; /* ใหญ่พิเศษ */
            font-weight: 700;
            color: #1A2B48;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        .curriculum-title {
            font-size: 2rem;
            color: #4a5568;
            margin-bottom: 40px;
        }

        /* --- เส้นสถานะระบบ (System Progress Bar) --- */
        .status-container {
            max-width: 600px;
            margin: 0 auto 50px auto;
        }

        .status-label {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: 500;
            color: #e53e3e;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: #edf2f7;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            width: 75%; /* ปรับเปอร์เซ็นต์สมมติที่นี่ */
            height: 100%;
            background: linear-gradient(90deg, #e53e3e, #f6ad55);
            border-radius: 10px;
            position: relative;
            animation: progressAnim 2s ease-in-out infinite alternate;
        }

        @keyframes progressAnim {
            0% { opacity: 0.8; width: 70%; }
            100% { opacity: 1; width: 80%; }
        }

        /* --- Countdown แบบยักษ์ --- */
        .countdown-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }

        .time-card {
            background: #fffaf0;
            padding: 30px 10px;
            border-radius: 25px;
            border: 2px solid #feebc8;
        }

        .time-num {
            display: block;
            font-size: 5rem; /* ขนาดตัวเลขยักษ์ */
            font-weight: 700;
            color: #c05621;
            line-height: 1;
        }

        .time-label {
            font-size: 1.2rem;
            color: #7b341e;
            font-weight: 500;
            margin-top: 5px;
        }

        /* --- ประกาศสำหรับนิสิต --- */
        .student-notice-box {
            background: #f8fafc;
            padding: 40px;
            border-radius: 30px;
            border: 1px dashed #cbd5e0;
        }

        .notice-text {
            font-size: 1.6rem;
            color: #2d3748;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .btn-large {
            display: inline-block;
            background: #1A2B48;
            color: #fff;
            padding: 22px 60px;
            font-size: 1.8rem;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(26, 43, 72, 0.25);
        }

        .btn-large:hover {
            transform: scale(1.05);
            background: #2d4369;
            box-shadow: 0 20px 45px rgba(26, 43, 72, 0.35);
        }

        .footer-info {
            margin-top: 40px;
            font-size: 1.2rem;
            color: #a0aec0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .time-num { font-size: 3rem; }
            .countdown-wrapper { grid-template-columns: repeat(2, 1fr); }
            .btn-large { font-size: 1.4rem; padding: 15px 30px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>เราจะกลับมา</h1>
    <p class="curriculum-title">ระบบตรวจสอบการเรียนตามหลักสูตร - หลักสูตรปรับปรุง พ.ศ. 2564</p>

    <div class="status-container">
        <div class="status-label">
            <span>สถานะ: กำลังอัปเกรดระบบ</span>
            <span>85%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill"></div>
        </div>
    </div>

    <div class="countdown-wrapper">
        <div class="time-card">
            <span class="time-num" id="days">00</span>
            <span class="time-label">วัน</span>
        </div>
        <div class="time-card">
            <span class="time-num" id="hours">00</span>
            <span class="time-label">ชั่วโมง</span>
        </div>
        <div class="time-card">
            <span class="time-num" id="minutes">00</span>
            <span class="time-label">นาที</span>
        </div>
        <div class="time-card">
            <span class="time-num" id="seconds">00</span>
            <span class="time-label">วินาที</span>
        </div>
    </div>

    <div class="student-notice-box">
        <p class="notice-text">
            ⚠️ <strong>สำหรับนิสิตปัจจุบัน</strong> โปรดใช้ระบบ หลักสูตรปรับปรุง พ.ศ. 2564
        </p>
        <a href="URL_ของระบบเก่าที่นี่" class="btn-large">เข้าสู่ระบบ (มคอ. 2564)</a>
    </div>

    <p class="footer-info">ระบบใหม่เปิดให้บริการวันที่ 20 เมษายน 2569 เวลา 01:00 น.</p>
</div>

<script>
    // ตั้งค่าเป้าหมาย: 20 เมษายน 2569 เวลา 01:00 น.
    const targetDate = new Date("April 20, 2026 01:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = d.toString().padStart(2, '0');
        document.getElementById("hours").innerText = h.toString().padStart(2, '0');
        document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
        document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

        if (diff < 0) {
            clearInterval(timer);
            document.querySelector(".countdown-wrapper").innerHTML = "<h2>ระบบพร้อมให้บริการแล้ว</h2>";
        }
    }, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบการเรียนตามหลักสูตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #ffffff; /* พื้นหลังสีขาว */
            color: #333;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 40px;
            background: #ffffff;
            border-radius: 30px;
            /* เพิ่มเงาจางๆ ให้ดูมีมิติ */
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.8rem;
            color: #1A2B48;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 5px;
        }

        .curriculum {
            font-weight: 600;
            color: #1A2B48;
            margin-bottom: 30px;
        }

        .status-text {
            display: inline-block;
            background: #fff5f5;
            color: #e53e3e;
            padding: 4px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Countdown Style - สะอาดตา */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .time-box {
            flex: 1;
            padding: 15px 5px;
            border-bottom: 2px solid #f0f0f0;
        }

        .time-num {
            display: block;
            font-size: 2.2rem;
            font-weight: 600;
            color: #D4AF37; /* สีทอง */
        }

        .time-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
        }

        /* ส่วนของนิสิตปัจจุบัน */
        .student-section {
            border-top: 1px solid #eee;
            padding-top: 30px;
        }

        .notice {
            font-size: 1rem;
            color: #555;
            margin-bottom: 20px;
        }

        .btn-legacy {
            display: inline-block;
            background-color: #1A2B48;
            color: white;
            padding: 14px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 400;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(26, 43, 72, 0.2);
        }

        .btn-legacy:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(26, 43, 72, 0.3);
            background-color: #253a5f;
        }

        .footer-date {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>เราจะกลับมา</h1>
    <p class="subtitle">ระบบตรวจสอบการเรียนตามหลักสูตร</p>
    <p class="curriculum">หลักสูตรปรับปรุง พ.ศ. 2564</p>
    
    <div class="status-text">● อยู่ระหว่างการพัฒนา</div>

    <div id="countdown">
        <div class="time-box">
            <span class="time-num" id="days">00</span>
            <span class="time-label">วัน</span>
        </div>
        <div class="time-box">
            <span class="time-num" id="hours">00</span>
            <span class="time-label">ชม.</span>
        </div>
        <div class="time-box">
            <span class="time-num" id="minutes">00</span>
            <span class="time-label">นาที</span>
        </div>
        <div class="time-box">
            <span class="time-num" id="seconds">00</span>
            <span class="time-label">วินาที</span>
        </div>
    </div>

    <div class="student-section">
        <p class="notice">สำหรับนิสิตปัจจุบัน โปรดใช้ระบบ หลักสูตรปรับปรุง พ.ศ. 2564</p>
        <a href="#" class="btn-legacy">เข้าสู่ระบบ (มคอ. 2564)</a>
    </div>

    <p class="footer-date">เปิดระบบวันที่ 20 เมษายน 2569 เวลา 01:00 น.</p>
</div>

<script>
    // ตั้งค่าเป้าหมาย: 20 เมษายน 2569 เวลา 01:00 น.
    const targetDate = new Date("April 20, 2026 01:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = d.toString().padStart(2, '0');
        document.getElementById("hours").innerHTML = h.toString().padStart(2, '0');
        document.getElementById("minutes").innerHTML = m.toString().padStart(2, '0');
        document.getElementById("seconds").innerHTML = s.toString().padStart(2, '0');

        if (diff < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "<h3>ระบบพร้อมใช้งานแล้ว</h3>";
        }
    }, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โครงการชุมนุมฟาร์มนิสิต 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Mali', cursive; background-color: #ffffff; color: #4b5563; }
        
        /* สไตล์การ์ดหน้าหลัก (ตามรูป Screenshot) */
        .main-card {
            background: white; border-radius: 35px;
            border: 2px solid #f3f4f6; padding: 40px;
            text-align: center; transition: all 0.4s ease;
        }
        .main-card:hover { 
            transform: translateY(-8px); 
            border-color: #10b981;
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.1);
        }

        .logo-box { transition: 0.5s ease; }
        .main-card:hover .logo-box { transform: scale(1.1); }

        /* ปุ่มแสดงรายละเอียด */
        .btn-black {
            background-color: #1a1c23; 
            color: white;
            padding: 16px 30px; 
            border-radius: 18px;
            width: 100%; 
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-black:hover { background-color: #10b981; }

        /* Modal แนวนอนขนาดยาว */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); 
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: white; 
            margin: 5vh auto; 
            border-radius: 40px;
            max-width: 1050px; 
            width: 95%; 
            display: flex; 
            flex-direction: row;
            overflow: hidden; 
            animation: zoomIn 0.3s both;
            max-height: 85vh;
        }

        /* กรอบ SDGs ที่ใส่รูป */
        .sdg-slot {
            width: 100%; aspect-ratio: 1; 
            border: 2px solid #f3f4f6;
            border-radius: 10px; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            background: #ffffff;
            overflow: hidden; /* ไม่ให้รูปภาพล้นกรอบ */
            transition: 0.3s ease;
        }
        .sdg-slot:hover {
            border-color: #10b981;
            transform: scale(1.05);
        }
        .sdg-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ปรับขนาดรูปภาพให้พอดีกับกรอบ */
            padding: 2px; /* เว้นระยะขอบรูปภาพนิดหน่อย */
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="py-12">

    <header class="max-w-4xl mx-auto text-center mb-16 animate__animated animate__fadeInUp">
        <h1 class="text-3xl md:text-5xl font-bold text-slate-800">
            โครงการชุมนุมฟาร์มนิสิต <span class="text-emerald-500 text-2xl md:text-4xl block md:inline">ปีการศึกษา 2569</span>
        </h1>
        <div class="h-1 w-20 bg-emerald-400 mx-auto mt-4 rounded-full"></div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 px-6">
        
        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
            <div class="logo-box mb-8 h-28 flex items-center justify-center">
                <img src="ชุมนุมฟาร์มนิสิต.png" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-10 text-slate-700 leading-tight min-h-[3rem]">โครงการเกษตรน้องใหม่<br>หัวใจ EDS</h2>
            <button onclick="openModal('modal1')" class="btn-black">แสดงรายละเอียด</button>
        </div>

        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.4s;">
            <div class="logo-box mb-8 h-28 flex items-center justify-center">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+ZERO+WASTE" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-10 text-slate-700 leading-tight min-h-[3rem]">โครงการจัดการนวัตกรรม<br>ขยะอินทรีย์สู่ปุ๋ยคุณภาพสูง</h2>
            <button onclick="openModal('modal2')" class="btn-black">แสดงรายละเอียด</button>
        </div>

        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.6s;">
            <div class="logo-box mb-8 h-28 flex items-center justify-center">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+SUFFICIENCY" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-10 text-slate-700 leading-tight min-h-[3rem]">โครงการถ่ายทอดความรู้<br>เกษตรพอเพียงสู่โรงเรียน</h2>
            <button onclick="openModal('modal3')" class="btn-black">แสดงรายละเอียด</button>
        </div>

    </main>

    <footer class="mt-24 py-10 text-center border-t border-slate-100 mx-10">
        <p class="text-slate-400 text-sm mb-1">จัดทำโดย</p>
        <p class="text-2xl font-bold text-slate-800">ชุมนุมฟาร์มนิสิต</p>
    </footer>

    <div id="modal1" class="modal"><div class="modal-content" id="c1"></div></div>
    <div id="modal2" class="modal"><div class="modal-content" id="c2"></div></div>
    <div id="modal3" class="modal"><div class="modal-content" id="c3"></div></div>

    <script>
        // ฐานข้อมูลโครงการ (พี่มาแก้รูปภาพ SDGs ตรงนี้ได้เลยครับจ้าาา)
        // ใส่ URL รูปภาพ SDGs ที่ต้องการในแต่ละกรอบ (เช่น 1-10) ของแต่ละโครงการ
        // ถ้ากรอบไหนไม่มีรูปภาพ ให้ใส่สตริงว่าง "" หรือ "-" หรือ URL รูปภาพ Placeholder

        const projectData = [
            {
                id: 'modal1',
                title: 'โครงการเกษตรน้องใหม่หัวใจ EDS',
                obj: ['เข้าใจพื้นฐาน EDS', 'สร้างทักษะผู้นำ', 'เรียนรู้ลงมือทำจริง', 'สร้างความสัมพันธ์'],
                // ใส่ URL รูปภาพ SDGs (SDG1 - SDG10) ของโครงการ 1 แยกทีละช่อง
                // Placeholder: https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+1
                sdgImages: [
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+4", // SDG1
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+13", // SDG2
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+15", // SDG3
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+17", // SDG4
                    "", // SDG5
                    "", // SDG6
                    "", // SDG7
                    "", // SDG8
                    "", // SDG9
                    "", // SDG10
                ]
            },
            {
                id: 'modal2',
                title: 'โครงการจัดการนวัตกรรมขยะอินทรีย์สู่ปุ๋ยคุณภาพสูง',
                obj: ['จัดการขยะในฟาร์ม', 'ผลิตปุ๋ยคุณภาพสูง', 'นวัตกรรม Zero Waste', 'ลดปริมาณขยะส่วนเกิน'],
                // ใส่ URL รูปภาพ SDGs (SDG1 - SDG10) ของโครงการ 2 แยกทีละช่อง
                sdgImages: [
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+12", // SDG1
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+13", // SDG2
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+15", // SDG3
                    "", // SDG4
                    "", // SDG5
                    "", // SDG6
                    "", // SDG7
                    "", // SDG8
                    "", // SDG9
                    "", // SDG10
                ]
            },
            {
                id: 'modal3',
                title: 'โครงการถ่ายทอดความรู้เกษตรพอเพียงสู่โรงเรียน',
                obj: ['ถ่ายทอดความพอเพียง', 'สร้างแปลงผักโรงเรียน', 'นิสิตได้ฝึกอาสา', 'สัมพันธ์มหาวิทยาลัย-ชุมชน'],
                // ใส่ URL รูปภาพ SDGs (SDG1 - SDG10) ของโครงการ 3 แยกทีละช่อง
                sdgImages: [
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+1", // SDG1
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+2", // SDG2
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+4", // SDG3
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+10", // SDG4
                    "https://via.placeholder.com/100x100/10b981/ffffff?text=SDG+17", // SDG5
                    "", // SDG6
                    "", // SDG7
                    "", // SDG8
                    "", // SDG9
                    "", // SDG10
                ]
            }
        ];

        // ฟังก์ชันสร้างเนื้อหาข้างใน Popup (Modal) โดยใช้ฐานข้อมูลด้านบน
        projectData.forEach((p, i) => {
            const sdgGridHtml = p.sdgImages.map((imageUrl, sdgIndex) => {
                const placeholder = `<div class="text-[9px] color-[#cbd5e1]">SDG</div>`; // Placeholder เมื่อไม่มีรูปภาพ
                const imageTag = imageUrl ? `<img src="${imageUrl}" alt="SDG ${sdgIndex + 1}" onerror="this.style.display='none'">` : placeholder;
                return `<div class="sdg-slot">${imageTag}</div>`;
            }).join('');

            document.getElementById(`c${i+1}`).innerHTML = `
                <div class="p-10 md:w-1/2 border-r border-slate-50 overflow-y-auto">
                    <h3 class="text-2xl font-bold text-emerald-600 mb-6 border-b-2 border-emerald-50 pb-2 leading-tight">${p.title}</h3>
                    <div class="space-y-4 text-sm">
                        <p><strong>ชื่อองค์กรนิสิต:</strong> ชุมนุมฟาร์มนิสิต คณะเกษตร</p>
                        <p><strong>กำหนดการจัดโครงการ:</strong> ปีการศึกษา 2569</p>
                        <div class="bg-emerald-50 p-6 rounded-3xl">
                            <p class="font-bold mb-4 text-emerald-800 text-lg">วัตถุประสงค์ของโครงการ</p>
                            <ul class="list-decimal pl-6 space-y-1.5 text-slate-600 font-light">
                                ${p.obj.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-slate-100">
                            <p><strong>กลุ่มเป้าหมาย:</strong> นิสิต / ชุมชน</p>
                            <p><strong>จำนวน:</strong> 100+ ท่าน</p>
                            <p class="col-span-2 font-bold text-emerald-600">งบประมาณดำเนินการ: ตามโครงการ</p>
                        </div>
                    </div>
                </div>
                <div class="p-10 md:w-1/2 bg-slate-50/50 flex flex-col justify-between">
                    <div>
                        <p class="font-bold text-slate-800 mb-5 text-sm uppercase tracking-wide">ลักษณะบรรลุเป้าหมายตามอัตลักษณ์ (IDKU)</p>
                        <div class="space-y-2.5 mb-10">
                            <div class="bg-white p-3 rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-sm shadow-sm flex items-center"><span class="mr-3">✅</span> I = สำนึกดี (Integrity)</div>
                            <div class="bg-white p-3 rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-sm shadow-sm flex items-center"><span class="mr-3">✅</span> D = มุ่งมั่น (Determination)</div>
                            <div class="bg-white p-3 rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-sm shadow-sm flex items-center"><span class="mr-3">✅</span> K = สร้างสรรค์ (Knowledge Creation)</div>
                            <div class="bg-white p-3 rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-sm shadow-sm flex items-center"><span class="mr-3">✅</span> U = สามัคคี (Unity)</div>
                        </div>
                        <p class="font-bold text-slate-800 mb-5 text-sm uppercase tracking-wide">เป้าหมายการพัฒนาอย่างยั่งยืน (SDGs)</p>
                        <div class="grid grid-cols-5 gap-2.5">
                            ${sdgGridHtml}
                        </div>
                    </div>
                    <button onclick="closeModal('${p.id}')" class="mt-12 bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-red-500 transition-all shadow-lg w-full">ปิดหน้าต่างรายละเอียด</button>
                </div>
            `;
        });

        // ฟังก์ชันควบคุม Pop-up (Modal)
        function openModal(id) { 
            document.getElementById(id).style.display = "block"; 
            document.body.style.overflow = "hidden"; // ล็อคสกอร์บาร์ของหน้าเว็บ
        }
        function closeModal(id) { 
            document.getElementById(id).style.display = "none"; 
            document.body.style.overflow = "auto"; // คืนสกอร์บาร์ของหน้าเว็บ
        }
        // ปิดเมื่อกดนอกหน้าต่าง (นอก .modal-content)
        window.onclick = function(e) { 
            if (e.target.className === 'modal') { 
                closeModal(e.target.id); 
            } 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โครงการชุมนุมฟาร์มนิสิต 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            font-family: 'Mali', cursive; 
            background-color: #ffffff; 
            color: #4b5563;
        }
        
        /* สไตล์การ์ดหน้าหลัก (ตามรูป Screenshot) */
        .main-card {
            background: white; 
            border-radius: 35px;
            border: 2px solid #f3f4f6; 
            padding: 40px;
            text-align: center; 
            transition: all 0.4s ease;
        }
        .main-card:hover { 
            transform: translateY(-8px); 
            border-color: #10b981;
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.1);
        }

        .logo-box { transition: 0.5s ease; }
        .main-card:hover .logo-box { transform: scale(1.1); }

        /* ปุ่มแสดงรายละเอียด */
        .btn-black {
            background-color: #1a1c23; 
            color: white;
            padding: 16px 30px; 
            border-radius: 18px;
            width: 100%; 
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-black:hover { background-color: #10b981; }

        /* Modal แนวนอนขนาดยาว */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: white; 
            margin: 5vh auto; 
            border-radius: 40px;
            max-width: 1050px; 
            width: 95%; 
            display: flex; 
            flex-direction: row;
            overflow: hidden; 
            animation: zoomIn 0.3s both;
            max-height: 85vh;
        }

        .sdg-slot {
            width: 100%; aspect-ratio: 1; 
            border: 2px solid #f3f4f6;
            border-radius: 12px; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            font-size: 10px; 
            color: #94a3b8;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="py-12">

    <header class="max-w-4xl mx-auto text-center mb-16 animate__animated animate__fadeInUp">
        <h1 class="text-3xl md:text-5xl font-bold text-slate-800">
            โครงการชุมนุมฟาร์มนิสิต <span class="text-emerald-500 text-2xl md:text-4xl block md:inline">ปีการศึกษา 2569</span>
        </h1>
        <div class="h-1 w-20 bg-emerald-400 mx-auto mt-4 rounded-full"></div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 px-6">
        
        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
            <div class="logo-box mb-8 h-28 flex items-center justify-center">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+EDS" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-10 text-slate-700">โครงการเกษตรน้องใหม่หัวใจ EDS</h2>
            <button onclick="openModal('modal1')" class="btn-black">แสดงรายละเอียด</button>
        </div>

        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.4s;">
            <div class="logo-box mb-8 h-28 flex items-center justify-center">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+ZERO+WASTE" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-10 text-slate-700">โครงการจัดการนวัตกรรมขยะอินทรีย์ฯ</h2>
            <button onclick="openModal('modal2')" class="btn-black">แสดงรายละเอียด</button>
        </div>

        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.6s;">
            <div class="logo-box mb-8 h-28 flex items-center justify-center">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+SUFFICIENCY" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-10 text-slate-700">โครงการเกษตรพอเพียงสู่โรงเรียน</h2>
            <button onclick="openModal('modal3')" class="btn-black">แสดงรายละเอียด</button>
        </div>

    </main>

    <footer class="mt-24 py-10 text-center border-t border-slate-100 mx-10">
        <p class="text-slate-400 text-sm mb-1">จัดทำโดย</p>
        <p class="text-2xl font-bold text-slate-800">ชุมนุมฟาร์มนิสิต</p>
    </footer>

    <div id="modal1" class="modal"><div class="modal-content" id="c1"></div></div>
    <div id="modal2" class="modal"><div class="modal-content" id="c2"></div></div>
    <div id="modal3" class="modal"><div class="modal-content" id="c3"></div></div>

    <script>
        // ข้อมูลโครงการ
        const projects = [
            { id: 'modal1', title: 'โครงการเกษตรน้องใหม่หัวใจ EDS', obj: ['เข้าใจพื้นฐาน EDS', 'สร้างทักษะผู้นำ', 'เรียนรู้ลงมือทำจริง', 'สร้างความสัมพันธ์'] },
            { id: 'modal2', title: 'โครงการจัดการนวัตกรรมขยะอินทรีย์ฯ', obj: ['จัดการขยะในฟาร์ม', 'ผลิตปุ๋ยคุณภาพสูง', 'นวัตกรรม Zero Waste', 'ลดปริมาณขยะส่วนเกิน'] },
            { id: 'modal3', title: 'โครงการเกษตรพอเพียงสู่โรงเรียน', obj: ['ถ่ายทอดความพอเพียง', 'สร้างแปลงผักโรงเรียน', 'นิสิตได้ฝึกอาสา', 'สัมพันธ์มหาวิทยาลัย-ชุมชน'] }
        ];

        // สร้างเนื้อหาข้างใน Popup
        projects.forEach((p, i) => {
            document.getElementById(`c${i+1}`).innerHTML = `
                <div class="p-10 md:w-1/2 border-r border-slate-50 overflow-y-auto">
                    <h3 class="text-2xl font-bold text-emerald-600 mb-6 border-b-2 border-emerald-50 pb-2">${p.title}</h3>
                    <div class="space-y-4 text-sm">
                        <p><strong>ชื่อองค์กรนิสิต:</strong> ชุมนุมฟาร์มนิสิต</p>
                        <p><strong>กำหนดการ:</strong> ปีการศึกษา 2569</p>
                        <div class="bg-emerald-50 p-5 rounded-3xl">
                            <p class="font-bold mb-3 text-emerald-800">วัตถุประสงค์ของโครงการ</p>
                            <ul class="list-decimal pl-5 space-y-1.5 text-slate-600">
                                ${p.obj.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <p><strong>กลุ่มเป้าหมาย:</strong> นิสิต/นักเรียน</p>
                            <p><strong>จำนวน:</strong> 100+ ท่าน</p>
                            <p class="col-span-2"><strong>งบประมาณดำเนินการ:</strong> ตามโครงการ</p>
                        </div>
                    </div>
                </div>
                <div class="p-10 md:w-1/2 bg-slate-50/50 flex flex-col justify-between">
                    <div>
                        <p class="font-bold text-slate-800 mb-4 text-sm">ลักษณะบรรลุเป้าหมายตามอัตลักษณ์ (IDKU)</p>
                        <div class="space-y-2 mb-8">
                            <p class="text-emerald-600 font-bold bg-white p-3 rounded-2xl border border-emerald-100">✅ I = สำนึกดี (Integrity)</p>
                            <p class="text-emerald-600 font-bold bg-white p-3 rounded-2xl border border-emerald-100">✅ D = มุ่งมั่น (Determination)</p>
                            <p class="text-emerald-600 font-bold bg-white p-3 rounded-2xl border border-emerald-100">✅ K = สร้างสรรค์ (Knowledge Creation)</p>
                            <p class="text-emerald-600 font-bold bg-white p-3 rounded-2xl border border-emerald-100">✅ U = สามัคคี (Unity)</p>
                        </div>
                        <p class="font-bold text-slate-800 mb-4 text-sm">เป้าหมายการพัฒนาอย่างยั่งยืน (SDGs)</p>
                        <div class="grid grid-cols-5 gap-2">
                            ${Array(10).fill('<div class="sdg-slot">SDG</div>').join('')}
                        </div>
                    </div>
                    <button onclick="closeModal('${p.id}')" class="mt-8 bg-slate-800 text-white py-3 rounded-2xl font-bold hover:bg-red-500 transition-all">ปิดหน้านี้</button>
                </div>
            `;
        });

        function openModal(id) { document.getElementById(id).style.display = "block"; document.body.style.overflow = "hidden"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; document.body.style.overflow = "auto"; }
        window.onclick = function(e) { if (e.target.className === 'modal') { closeModal(e.target.id); } }
    </script>
</body>
</html>

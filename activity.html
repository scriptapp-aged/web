<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โครงการชุมนุมฟาร์มนิสิต 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Mali', cursive; background-color: #ffffff; color: #4b5563; }
        
        .main-card {
            background: white; border-radius: 40px; border: 2px solid #f3f4f6; 
            padding: 45px; text-align: center; transition: all 0.4s ease;
        }
        .main-card:hover { 
            transform: translateY(-8px); border-color: #10b981;
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.1);
        }

        .btn-black {
            background-color: #1a1c23; color: white; padding: 18px 30px; 
            border-radius: 20px; width: 100%; font-weight: 600; transition: 0.3s;
        }
        .btn-black:hover { background-color: #10b981; }

        .modal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(10px);
        }
        .modal-content {
            background: white; margin: 4vh auto; border-radius: 45px;
            max-width: 1100px; width: 95%; display: flex; flex-direction: row;
            overflow: hidden; animation: zoomIn 0.3s both; max-height: 90vh;
        }

        .sdg-slot {
            width: 100%; aspect-ratio: 1; border: 2px solid #f1f5f9;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 10px; color: #94a3b8; background: #fff;
        }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="py-12">

    <header class="max-w-5xl mx-auto text-center mb-20 animate__animated animate__fadeInDown">
        <h1 class="text-3xl md:text-5xl font-bold text-slate-800">
            โครงการชุมนุมฟาร์มนิสิต <span class="text-emerald-500">ปีการศึกษา 2569</span>
        </h1>
        <div class="h-1.5 w-24 bg-emerald-400 mx-auto mt-6 rounded-full"></div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10 px-6">
        <div class="main-card animate__animated animate__fadeInUp">
            <div class="mb-10 h-32 flex items-center justify-center transition-transform hover:scale-110">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+EDS" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-12 text-slate-700">โครงการเกษตรน้องใหม่หัวใจ EDS</h2>
            <button onclick="openModal('modal1')" class="btn-black shadow-lg">แสดงรายละเอียด</button>
        </div>

        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
            <div class="mb-10 h-32 flex items-center justify-center transition-transform hover:scale-110">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+ZERO+WASTE" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-12 text-slate-700">โครงการนวัตกรรมขยะสู่ปุ๋ย</h2>
            <button onclick="openModal('modal2')" class="btn-black shadow-lg">แสดงรายละเอียด</button>
        </div>

        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.4s;">
            <div class="mb-10 h-32 flex items-center justify-center transition-transform hover:scale-110">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+SUFFICIENCY" class="max-h-full">
            </div>
            <h2 class="text-xl font-bold mb-12 text-slate-700">โครงการเกษตรพอเพียงสู่โรงเรียน</h2>
            <button onclick="openModal('modal3')" class="btn-black shadow-lg">แสดงรายละเอียด</button>
        </div>
    </main>

    <footer class="mt-32 py-12 text-center border-t border-slate-100 mx-10 animate__animated animate__fadeIn">
        <p class="text-slate-400 text-sm mb-2">จัดทำโดย</p>
        <p class="text-3xl font-bold text-slate-800">ชุมนุมฟาร์มนิสิต</p>
    </footer>

    <div id="modal1" class="modal"><div class="modal-content" id="c1"></div></div>
    <div id="modal2" class="modal"><div class="modal-content" id="c2"></div></div>
    <div id="modal3" class="modal"><div class="modal-content" id="c3"></div></div>

    <script>
        const projectData = [
            {
                id: 'modal1',
                title: 'โครงการเกษตรน้องใหม่หัวใจ EDS',
                org: 'ชุมนุมฟาร์มนิสิต',
                date: 'สิงหาคม 2569',
                budget: '25,000 บาท',
                target: 'นิสิตใหม่',
                amount: '150 คน',
                obj: ['ปูพื้นฐานเกษตร EDS', 'สร้างผู้นำรุ่นใหม่', 'เรียนรู้ลงมือทำจริง', 'สร้างเครือข่ายนิสิต'],
                sdgs: ['SDG 4', 'SDG 13', 'SDG 15', 'SDG 17', '-', '-', '-', '-', '-', '-'] // แก้ไขเป็นเลข SDG ที่ต้องการ
            },
            {
                id: 'modal2',
                title: 'โครงการจัดการนวัตกรรมขยะอินทรีย์ฯ',
                org: 'ชุมนุมฟาร์มนิสิต',
                date: 'กันยายน 2569',
                budget: '45,000 บาท',
                target: 'นิสิตและบุคลากร',
                amount: '80 คน',
                obj: ['จัดการขยะในฟาร์ม', 'แปรรูปสู่ปุ๋ยคุณภาพ', 'นวัตกรรม Zero Waste', 'ลดต้นทุนการผลิต'],
                sdgs: ['SDG 9', 'SDG 11', 'SDG 12', 'SDG 13', 'SDG 14', 'SDG 15', '-', '-', '-', '-']
            },
            {
                id: 'modal3',
                title: 'โครงการเกษตรพอเพียงสู่โรงเรียน',
                org: 'ชุมนุมฟาร์มนิสิต',
                date: 'พฤศจิกายน 2569',
                budget: '30,000 บาท',
                target: 'โรงเรียนในพื้นที่',
                amount: '100 คน',
                obj: ['สอนหลักความพอเพียง', 'สร้างแหล่งอาหารโรงเรียน', 'นิสิตฝึกงานอาสา', 'เชื่อมสัมพันธ์ชุมชน'],
                sdgs: ['SDG 1', 'SDG 2', 'SDG 4', 'SDG 10', 'SDG 17', '-', '-', '-', '-', '-']
            }
        ];

        projectData.forEach((p, i) => {
            document.getElementById(`c${i+1}`).innerHTML = `
                <div class="p-12 md:w-1/2 border-r border-slate-50 overflow-y-auto">
                    <h3 class="text-2xl font-bold text-emerald-600 mb-8 border-b-2 border-emerald-50 pb-2">${p.title}</h3>
                    <div class="space-y-4 text-sm">
                        <p><strong>ชื่อองค์กรนิสิต:</strong> ${p.org}</p>
                        <p><strong>กำหนดการ:</strong> ${p.date}</p>
                        <div class="bg-emerald-50 p-6 rounded-[2.5rem]">
                            <p class="font-bold mb-4 text-emerald-800">วัตถุประสงค์ของโครงการ</p>
                            <ul class="list-decimal pl-6 space-y-2 text-slate-600">
                                ${p.obj.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-6">
                            <p><strong>กลุ่มเป้าหมาย:</strong> ${p.target}</p>
                            <p><strong>จำนวน:</strong> ${p.amount}</p>
                            <p class="col-span-2 font-bold text-emerald-600">งบประมาณดำเนินการ: ${p.budget}</p>
                        </div>
                    </div>
                </div>
                <div class="p-12 md:w-1/2 bg-slate-50/50 flex flex-col justify-between">
                    <div>
                        <p class="font-bold text-slate-800 mb-5 text-sm uppercase tracking-wide">บรรลุเป้าหมายตามอัตลักษณ์ (IDKU)</p>
                        <div class="space-y-2.5 mb-10">
                            <div class="bg-white p-3 rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-sm shadow-sm">✅ I = สำนึกดี (Integrity)</div>
                            <div class="bg-white p-3 rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-sm shadow-sm">✅ D = มุ่งมั่น (Determination)</div>
                            <div class="bg-white p-3 rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-sm shadow-sm">✅ K = สร้างสรรค์ (Knowledge Creation)</div>
                            <div class="bg-white p-3 rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-sm shadow-sm">✅ U = สามัคคี (Unity)</div>
                        </div>
                        <p class="font-bold text-slate-800 mb-5 text-sm uppercase tracking-wide">เป้าหมายการพัฒนาอย่างยั่งยืน (SDGs)</p>
                        <div class="grid grid-cols-5 gap-3">
                            ${p.sdgs.map(sdg => `<div class="sdg-slot">${sdg}</div>`).join('')}
                        </div>
                    </div>
                    <button onclick="closeModal('${p.id}')" class="mt-12 bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-red-500 transition-all shadow-lg">ปิดหน้านี้</button>
                </div>
            `;
        });

        function openModal(id) { document.getElementById(id).style.display = "block"; document.body.style.overflow = "hidden"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; document.body.style.overflow = "auto"; }
        window.onclick = function(e) { if (e.target.className === 'modal') { closeModal(e.target.id); } }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โครงการชุมนุมฟาร์มนิสิต 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #ffffff; color: #1e293b; overflow-x: hidden; }
        
        .header-anim { animation: fadeInDown 1s both; }
        
        /* การ์ดหน้าหลักสไตล์คลีน */
        .main-card {
            background: white; border-radius: 40px;
            border: 1px solid #f1f5f9; padding: 45px;
            text-align: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }
        .main-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); border-color: #10b981; }

        /* ลูกเล่นโลโก้ */
        .logo-box { transition: all 0.5s ease; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.03)); }
        .main-card:hover .logo-box { transform: scale(1.1) rotate(2deg); filter: drop-shadow(0 15px 20px rgba(16, 185, 129, 0.15)); }

        .btn-black {
            background-color: #121926; color: white;
            padding: 18px 30px; border-radius: 20px;
            width: 100%; font-weight: 500; font-size: 1.1rem;
            transition: all 0.3s;
        }
        .btn-black:hover { background-color: #10b981; }

        /* Modal แนวนอนขนาดยาว */
        .modal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
        }
        .modal-content {
            background: white; margin: 5vh auto; border-radius: 45px;
            max-width: 1100px; width: 95%; display: flex; flex-direction: row;
            overflow: hidden; animation: zoomIn 0.4s both; height: auto; max-height: 90vh;
        }

        .sdg-slot {
            width: 100%; aspect-ratio: 1; border: 1.5px dashed #cbd5e1;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 9px; color: #94a3b8; background: #fff;
        }
    </style>
</head>
<body class="py-12 px-6">

    <header class="max-w-6xl mx-auto text-center mb-20 header-anim">
        <h1 class="text-4xl md:text-5xl font-bold text-slate-800 tracking-tight">
            โครงการชุมนุมฟาร์มนิสิต <span class="text-emerald-500 italic">ปีการศึกษา 2569</span>
        </h1>
        <div class="h-1.5 w-24 bg-emerald-500 mx-auto mt-6 rounded-full"></div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10">
        
        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.1s;">
            <div class="logo-box mb-10 h-32 flex items-center justify-center">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+EDS" class="max-h-full object-contain">
            </div>
            <h2 class="text-xl font-bold mb-12 text-slate-700">โครงการเกษตรน้องใหม่หัวใจ EDS</h2>
            <button onclick="openModal('modal1')" class="btn-black">แสดงรายละเอียด</button>
        </div>

        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.3s;">
            <div class="logo-box mb-10 h-32 flex items-center justify-center">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+ZERO+WASTE" class="max-h-full object-contain">
            </div>
            <h2 class="text-xl font-bold mb-12 text-slate-700">โครงการจัดการนวัตกรรมขยะอินทรีย์ฯ</h2>
            <button onclick="openModal('modal2')" class="btn-black">แสดงรายละเอียด</button>
        </div>

        <div class="main-card animate__animated animate__fadeInUp" style="animation-delay: 0.5s;">
            <div class="logo-box mb-10 h-32 flex items-center justify-center">
                <img src="https://via.placeholder.com/350x120/ffffff/10b981?text=LOGO+SUFFICIENCY" class="max-h-full object-contain">
            </div>
            <h2 class="text-xl font-bold mb-12 text-slate-700">โครงการเกษตรพอเพียงสู่โรงเรียน</h2>
            <button onclick="openModal('modal3')" class="btn-black">แสดงรายละเอียด</button>
        </div>

    </main>

    <div id="modal1" class="modal"><div class="modal-content" id="content1"></div></div>
    <div id="modal2" class="modal"><div class="modal-content" id="content2"></div></div>
    <div id="modal3" class="modal"><div class="modal-content" id="content3"></div></div>

    <script>
        // ข้อมูลโครงการ (พี่มาแก้ข้อความตรงนี้ได้เลย)
        const projects = [
            {
                id: 'modal1',
                title: 'โครงการเกษตรน้องใหม่หัวใจ EDS',
                org: 'ชุมนุมฟาร์มนิสิต คณะเกษตร',
                date: 'สิงหาคม - กันยายน 2569',
                budget: '25,000 บาท',
                target: 'นิสิตใหม่ทุกคณะ',
                amount: '150 คน',
                objectives: [
                    'เพื่อปูพื้นฐานงานเกษตรสมัยใหม่ด้วยแนวคิด EDS',
                    'เพื่อพัฒนาทักษะการเป็นผู้นำและการจัดการฟาร์ม',
                    'เพื่อสร้างเครือข่ายความร่วมมือระหว่างนิสิตใหม่',
                    'เพื่อปลูกฝังจิตสำนึกรับผิดชอบต่อสิ่งแวดล้อม'
                ]
            },
            {
                id: 'modal2',
                title: 'โครงการจัดการนวัตกรรมขยะอินทรีย์สู่ปุ๋ยคุณภาพสูง',
                org: 'ชุมนุมฟาร์มนิสิต คณะเกษตร',
                date: 'ตุลาคม - พฤศจิกายน 2569',
                budget: '45,000 บาท',
                target: 'นิสิตและบุคลากร',
                amount: '80 คน',
                objectives: [
                    'เพื่อบริหารจัดการขยะอินทรีย์ภายในมหาวิทยาลัย',
                    'เพื่อผลิตปุ๋ยอินทรีย์คุณภาพสูงสำหรับใช้ในฟาร์ม',
                    'เพื่อสร้างแหล่งเรียนรู้นวัตกรรม Zero Waste',
                    'เพื่อลดต้นทุนการผลิตและรักษาสิ่งแวดล้อมอย่างยั่งยืน'
                ]
            },
            {
                id: 'modal3',
                title: 'โครงการเกษตรพอเพียงสู่โรงเรียน',
                org: 'ชุมนุมฟาร์มนิสิต คณะเกษตร',
                date: 'พฤศจิกายน 2569',
                budget: '30,000 บาท',
                target: 'โรงเรียนในพื้นที่ใกล้เคียง',
                amount: '100 คน',
                objectives: [
                    'เพื่อถ่ายทอดความรู้การเกษตรตามหลักเศรษฐกิจพอเพียง',
                    'เพื่อพัฒนาแหล่งเรียนรู้ในโรงเรียนเพื่อความมั่นคงทางอาหาร',
                    'เพื่อให้นิสิตได้ฝึกทักษะการถ่ายทอดความรู้สู่ชุมชน',
                    'เพื่อสร้างความสัมพันธ์อันดีระหว่างมหาวิทยาลัยและโรงเรียน'
                ]
            }
        ];

        // ฟังก์ชันสร้าง HTML ด้านใน Modal ให้เหมือนกันเป๊ะ
        projects.forEach((proj, index) => {
            const container = document.getElementById(`content${index + 1}`);
            container.innerHTML = `
                <div class="p-10 md:w-1/2 border-r border-slate-100 overflow-y-auto">
                    <h3 class="text-2xl font-bold text-emerald-600 mb-6 pb-2 border-b-2 border-emerald-100">${proj.title}</h3>
                    <div class="space-y-4 text-sm">
                        <div><p class="text-slate-400 font-bold text-[10px] uppercase mb-1">ชื่อองค์กรนิสิต</p><p class="font-medium text-slate-800">${proj.org}</p></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-slate-400 font-bold text-[10px] uppercase mb-1">กำหนดการจัดโครงการ</p><p class="text-slate-800">${proj.date}</p></div>
                            <div><p class="text-slate-400 font-bold text-[10px] uppercase mb-1">งบประมาณดำเนินการ</p><p class="text-emerald-600 font-bold">${proj.budget}</p></div>
                        </div>
                        <div>
                            <p class="text-slate-400 font-bold text-[10px] uppercase mb-2">วัตถุประสงค์ของโครงการ</p>
                            <ul class="list-decimal pl-5 space-y-1.5 text-slate-600">
                                ${proj.objectives.map(obj => `<li>${obj}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="grid grid-cols-2 gap-4 border-t pt-4">
                            <div><p class="text-slate-400 font-bold text-[10px] uppercase mb-1">กลุ่มเป้าหมาย</p><p class="text-slate-800">${proj.target}</p></div>
                            <div><p class="text-slate-400 font-bold text-[10px] uppercase mb-1">จำนวนผู้เข้าร่วม</p><p class="text-slate-800">${proj.amount}</p></div>
                        </div>
                    </div>
                </div>

                <div class="p-10 md:w-1/2 bg-slate-50/50 flex flex-col justify-between">
                    <div>
                        <h4 class="font-bold text-slate-800 mb-5 flex items-center text-sm">
                            <span class="bg-emerald-500 text-white px-2 py-0.5 rounded mr-2 text-[10px]">IDKU</span>
                            บรรลุเป้าหมายตามอัตลักษณ์ (IDKU)
                        </h4>
                        <div class="grid grid-cols-1 gap-2 mb-8">
                            <div class="flex items-center text-emerald-600 text-sm bg-white p-2.5 rounded-xl border border-emerald-100 font-medium">✅ I = สำนึกดี (Integrity)</div>
                            <div class="flex items-center text-emerald-600 text-sm bg-white p-2.5 rounded-xl border border-emerald-100 font-medium">✅ D = มุ่งมั่น (Determination)</div>
                            <div class="flex items-center text-emerald-600 text-sm bg-white p-2.5 rounded-xl border border-emerald-100 font-medium">✅ K = สร้างสรรค์ (Knowledge Creation)</div>
                            <div class="flex items-center text-emerald-600 text-sm bg-white p-2.5 rounded-xl border border-emerald-100 font-medium">✅ U = สามัคคี (Unity)</div>
                        </div>

                        <h4 class="font-bold text-slate-800 mb-5 flex items-center text-sm">
                            <span class="bg-blue-500 text-white px-2 py-0.5 rounded mr-2 text-[10px]">SDGs</span>
                            เป้าหมายการพัฒนาอย่างยั่งยืน (SDGs)
                        </h4>
                        <div class="grid grid-cols-5 gap-2">
                            ${Array(10).fill(0).map(() => `<div class="sdg-slot">IMG</div>`).join('')}
                        </div>
                    </div>
                    <button onclick="closeModal('${proj.id}')" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-red-500 transition-all">ปิดหน้านี้</button>
                </div>
            `;
        });

        function openModal(id) {
            document.getElementById(id).style.display = "block";
            document.body.style.overflow = "hidden";
        }
        function closeModal(id) {
            document.getElementById(id).style.display = "none";
            document.body.style.overflow = "auto";
        }
        window.onclick = function(e) { if (e.target.className === 'modal') { closeModal(e.target.id); } }
    </script>
</body>
</html>
